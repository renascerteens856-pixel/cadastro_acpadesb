<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cadastro de Adolescentes</title>

  <!-- BOOTSTRAP -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body { background: #f5f5f5; }
    .container-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    #mensagem { display: none; }
  </style>

</head>
<body>

<div class="container mt-4">
  <h2 class="text-center mb-3">Cadastro de Adolescentes</h2>

  <!-- FORMULÁRIO -->
  <div class="container-box">
    <div class="row g-3">

      <div class="col-md-8">
        <label>Nome completo</label>
        <input id="nome" class="form-control" />
      </div>

      <div class="col-md-4">
        <label>Contato</label>
        <input id="contato" class="form-control" placeholder="(99) 99999-9999" maxlength="15" />
      </div>

      <div class="col-md-6">
        <label>Nome do Pai</label>
        <input id="nome_pai" class="form-control" />
      </div>

      <div class="col-md-6">
        <label>Nome da Mãe</label>
        <input id="nome_mae" class="form-control" />
      </div>

      <div class="col-md-4">
        <label>Data de Nascimento</label>
        <input id="data_nasc" type="date" class="form-control" />
      </div>

      <hr />

      <h5>Endereço</h5>

      <div class="col-md-6">
        <label>Rua</label>
        <input id="rua" class="form-control" />
      </div>

      <div class="col-md-3">
        <label>Número</label>
        <input id="numero" class="form-control" />
      </div>

      <div class="col-md-3">
        <label>Bairro</label>
        <input id="bairro" class="form-control" />
      </div>

      <div class="col-12 mt-3">
        <button onclick="salvarAdolescente()" class="btn btn-primary w-100">Salvar</button>
      </div>
    </div>
  </div>

  <!-- BUSCA -->
  <div class="container-box mt-3">
    <div class="row g-2">
      <div class="col-md-8">
        <input id="busca_nome" class="form-control" placeholder="Buscar por nome..." />
      </div>
      <div class="col-md-2">
        <button onclick="buscar()" class="btn btn-outline-primary w-100">Pesquisar</button>
      </div>
      <div class="col-md-2">
        <button onclick="listarTodos()" class="btn btn-secondary w-100">Listar Todos</button>
      </div>
    </div>
  </div>

  <!-- LISTA -->
  <div id="mensagem" class="alert alert-danger mt-3"></div>
  <div id="lista" class="container-box mt-3"></div>
</div>


<!-- MODAL EDIÇÃO -->
<div class="modal fade" id="modalEditar" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Editar Adolescente</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input type="hidden" id="edit_id" />

        <div class="row g-3">
          <div class="col-md-8">
            <label>Nome completo</label>
            <input id="edit_nome" class="form-control" />
          </div>

          <div class="col-md-4">
            <label>Contato</label>
            <input id="edit_contato" class="form-control" maxlength="15" />
          </div>

          <div class="col-md-6">
            <label>Nome do Pai</label>
            <input id="edit_nome_pai" class="form-control" />
          </div>

          <div class="col-md-6">
            <label>Nome da Mãe</label>
            <input id="edit_nome_mae" class="form-control" />
          </div>

          <div class="col-md-4">
            <label>Data de Nascimento</label>
            <input id="edit_data_nasc" class="form-control" type="date" />
          </div>

          <hr />

          <h5>Endereço</h5>

          <div class="col-md-6">
            <label>Rua</label>
            <input id="edit_rua" class="form-control" />
          </div>

          <div class="col-md-3">
            <label>Número</label>
            <input id="edit_numero" class="form-control" />
          </div>

          <div class="col-md-3">
            <label>Bairro</label>
            <input id="edit_bairro" class="form-control" />
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button onclick="salvarEdicao()" class="btn btn-primary">Salvar Alterações</button>
      </div>

    </div>
  </div>
</div>


<!-- BOOTSTRAP JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ===============================
      CONFIGURAÇÃO
=============================== */

// 🔥 ALTERE A SUA URL DA API AQUI:
const API_BASE = "https://cadastro-adolescentes.onrender.com";

/* ===============================
      FUNÇÕES DE FORMATAÇÃO
=============================== */

function mascaraContato(v) {
  v = v.replace(/\D/g, "");
  v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
  v = v.replace(/(\d{5})(\d)/, "$1-$2");
  return v;
}

document.getElementById("contato").addEventListener("input", (e) => {
  e.target.value = mascaraContato(e.target.value);
});

document.getElementById("edit_contato").addEventListener("input", (e) => {
  e.target.value = mascaraContato(e.target.value);
});

/* ===============================
      BUSCAR TODOS
=============================== */
async function listarTodos() {
  try {
    const res = await fetch(`${API_BASE}/adolescentes`);
    const dados = await res.json();
    mostrarLista(dados);
  } catch {
    erro("Erro ao carregar dados.");
  }
}

/* ===============================
      BUSCAR POR NOME
=============================== */
async function buscar() {
  const nome = document.getElementById("busca_nome").value;

  if (!nome.trim()) {
    listarTodos();
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/adolescentes/nome/${nome}`);
    const dados = await res.json();
    mostrarLista(dados);
  } catch {
    erro("Erro ao buscar dados.");
  }
}

/* ===============================
      SALVAR NOVO
=============================== */
async function salvarAdolescente() {
  const payload = {
    nome: nome.value,
    contato: contato.value,
    nome_pai: nome_pai.value,
    nome_mae: nome_mae.value,
    data_nasc: data_nasc.value,
    endereco: {
      rua: rua.value,
      numero: numero.value,
      bairro: bairro.value
    }
  };

  try {
    await fetch(`${API_BASE}/adolescentes/create`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    listarTodos();
  } catch {
    erro("Erro ao salvar.");
  }
}

/* ===============================
      CARREGAR NO MODAL
=============================== */
function editar(id) {
  fetch(`${API_BASE}/adolescentes/${id}`)
    .then(r => r.json())
    .then(d => {
      edit_id.value = id;
      edit_nome.value = d.nome;
      edit_contato.value = mascaraContato(d.contato);
      edit_nome_pai.value = d.nome_pai;
      edit_nome_mae.value = d.nome_mae;
      edit_data_nasc.value = d.data_nasc;

      edit_rua.value = d.endereco?.rua;
      edit_numero.value = d.endereco?.numero;
      edit_bairro.value = d.endereco?.bairro;

      new bootstrap.Modal(modalEditar).show();
    });
}

/* ===============================
      SALVAR EDIÇÃO
=============================== */
async function salvarEdicao() {
  const id = edit_id.value;

  const payload = {
    nome: edit_nome.value,
    contato: edit_contato.value,
    nome_pai: edit_nome_pai.value,
    nome_mae: edit_nome_mae.value,
    data_nasc: edit_data_nasc.value,
    endereco: {
      rua: edit_rua.value,
      numero: edit_numero.value,
      bairro: edit_bairro.value
    }
  };

  await fetch(`${API_BASE}/adolescentes/update/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  listarTodos();
}

/* ===============================
      DELETAR
=============================== */
async function deletar(id) {
  if (!confirm("Tem certeza que deseja excluir?")) return;

  await fetch(`${API_BASE}/adolescentes/delete/${id}`, { method: "DELETE" });

  listarTodos();
}

/* ===============================
      IMPRESSÃO
=============================== */
function imprimirRegistro(d) {
  const html = `
  <!doctype html>
  <html>
  <head>
    <meta charset="utf-8">
    <title>Ficha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      .logo { width: 180px; margin: 15px auto; display: block; }
    </style>
  </head>
  <body>

    <img src="/Images/logo_adolescentes" class="logo" />

    <div class="container">
      <h3 class="text-center">Ficha do Adolescente</h3>
      <hr>

      <p><strong>Nome:</strong> ${d.nome}</p>
      <p><strong>Pai:</strong> ${d.nome_pai}</p>
      <p><strong>Mãe:</strong> ${d.nome_mae}</p>
      <p><strong>Contato:</strong> ${d.contato}</p>
      <p><strong>Data de nascimento:</strong> ${d.data_nasc}</p>
      <p><strong>Endereço:</strong> ${d.endereco.rua}, ${d.endereco.numero} - ${d.endereco.bairro}</p>

    </div>

    <script>
      window.onload = function() {
        window.print();
        window.onafterprint = function() { window.close(); };
      }
    <\/script>

  </body>
  </html>
  `;

  const w = window.open("", "_blank");
  w.document.write(html);
  w.document.close();
}

/* ===============================
      LISTA
=============================== */
function mostrarLista(lista) {
  let html = `
    <table class="table table-striped">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Contato</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
  `;

  lista.forEach(d => {
    html += `
      <tr>
        <td>${d.nome}</td>
        <td>${d.contato}</td>
        <td>
          <button class="btn btn-sm btn-warning" onclick="editar('${d.id}')">Editar</button>
          <button class="btn btn-sm btn-danger" onclick="deletar('${d.id}')">Excluir</button>
          <button class="btn btn-sm btn-primary" onclick='imprimirRegistro(${JSON.stringify(d)})'>Imprimir</button>
        </td>
      </tr>
    `;
  });

  html += "</tbody></table>";

  listaDiv = document.getElementById("lista");
  listaDiv.innerHTML = html;
}

function erro(msg) {
  mensagem.style.display = "block";
  mensagem.innerText = msg;
}

document.addEventListener("DOMContentLoaded", listarTodos);
</script>

</body>
</html>
