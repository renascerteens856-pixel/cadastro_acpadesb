<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cadastro de Adolescentes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script>
    const API_BASE = 'https://cadastro-adolescentes.onrender.com/adolescentes';
  </script>
  <style>
    body { padding-top: 1rem; }
    .table-responsive { max-height: 60vh; overflow: auto; }
  </style>
</head>
<body>
<div class="container">
  <div class="row mb-3">
    <div class="col-md-8">
      <h1 class="h3">Cadastro de Adolescentes</h1>
      <p class="text-muted">Front-end único (index) integrado à sua API.</p>
    </div>
    <div class="col-md-4 text-md-end align-self-center">
      <button class="btn btn-primary" data-bs-toggle="collapse" data-bs-target="#formCadastro" aria-expanded="false">Novo Cadastro</button>
    </div>
  </div>

  <!-- FORMULÁRIO DE CADASTRO (colapsável) -->
  <div class="collapse mb-4" id="formCadastro">
    <div class="card card-body">
      <form id="form-create" novalidate>
        <div class="row g-2">
          <div class="col-md-6">
            <label class="form-label">Nome</label>
            <input required name="nome" class="form-control" />
          </div>
          <div class="col-md-3">
            <label class="form-label">Nome do pai</label>
            <input name="nome_pai" class="form-control" />
          </div>
          <div class="col-md-3">
            <label class="form-label">Nome da mãe</label>
            <input name="nome_mae" class="form-control" />
          </div>
        </div>

        <div class="row g-2 mt-2">
          <div class="col-md-3">
            <label class="form-label">Contato</label>
            <input name="contato" class="form-control" />
          </div>
          <div class="col-md-3">
            <label class="form-label">Data de nascimento</label>
            <input type="date" name="data_nasc" class="form-control" />
          </div>
          <div class="col-md-3">
            <label class="form-label">Bairro</label>
            <input name="bairro" class="form-control" />
          </div>
          <div class="col-md-3">
            <label class="form-label">Cidade</label>
            <input name="cidade" class="form-control" />
          </div>
        </div>

        <div class="mt-3 d-flex gap-2">
          <button type="submit" class="btn btn-success">Salvar</button>
          <button type="button" class="btn btn-secondary" data-bs-toggle="collapse" data-bs-target="#formCadastro">Fechar</button>
          <div id="create-feedback" class="ms-auto"></div>
        </div>
      </form>
    </div>
  </div>

  <!-- FILTROS E BUSCA -->
  <div class="card mb-3">
    <div class="card-body">
      <form id="form-filtros" class="row g-2 align-items-end">
        <div class="col-md-4">
          <label class="form-label">Buscar por nome</label>
          <input id="filtro-nome" class="form-control" placeholder="Nome..." />
        </div>
        <div class="col-md-3">
          <label class="form-label">Filtrar por bairro</label>
          <input id="filtro-bairro" class="form-control" placeholder="Bairro..." />
        </div>
        <div class="col-md-2">
          <label class="form-label">Ordenar por</label>
          <select id="ordenar-por" class="form-select">
            <option value="id">id</option>
            <option value="nome">nome</option>
            <option value="data_nasc">data_nasc</option>
          </select>
        </div>
        <div class="col-md-1">
          <label class="form-label">Ordem</label>
          <select id="ordem" class="form-select">
            <option value="desc">desc</option>
            <option value="asc">asc</option>
          </select>
        </div>
        <div class="col-md-2 text-end">
          <button id="btn-aplicar" class="btn btn-primary">Aplicar</button>
          <button id="btn-reset" type="button" class="btn btn-outline-secondary">Limpar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- TABELA DE RESULTADOS -->
  <div class="card">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover table-sm" id="tabela-adolescentes">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Nome</th>
              <th>Contato</th>
              <th>Data Nasc</th>
              <th>Bairro / Cidade</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <!-- PAGINAÇÃO -->
      <div class="d-flex justify-content-between align-items-center mt-2">
        <div>
          <small id="info-pag">Página <span id="pagina-atual">1</span></small>
        </div>
        <div>
          <button id="prev" class="btn btn-outline-secondary btn-sm">Anterior</button>
          <button id="next" class="btn btn-outline-secondary btn-sm">Próxima</button>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- MODAL EDITAR -->
<div class="modal fade" id="modalEditar" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Editar Adolescente</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="form-edit" novalidate>
          <input type="hidden" name="id" />
          <div class="row g-2">
            <div class="col-md-6">
              <label class="form-label">Nome</label>
              <input required name="nome" class="form-control" />
            </div>
            <div class="col-md-3">
              <label class="form-label">Nome do pai</label>
              <input name="nome_pai" class="form-control" />
            </div>
            <div class="col-md-3">
              <label class="form-label">Nome da mãe</label>
              <input name="nome_mae" class="form-control" />
            </div>
          </div>

          <div class="row g-2 mt-2">
            <div class="col-md-3">
              <label class="form-label">Contato</label>
              <input name="contato" class="form-control" />
            </div>
            <div class="col-md-3">
              <label class="form-label">Data de nascimento</label>
              <input type="date" name="data_nasc" class="form-control" />
            </div>
            <div class="col-md-3">
              <label class="form-label">Bairro</label>
              <input name="bairro" class="form-control" />
            </div>
            <div class="col-md-3">
              <label class="form-label">Cidade</label>
              <input name="cidade" class="form-control" />
            </div>
          </div>

        </form>
      </div>
      <div class="modal-footer">
        <div id="edit-feedback" class="me-auto"></div>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
        <button id="btn-save-edit" class="btn btn-primary">Salvar alterações</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// utilidades
function showAlert(targetEl, msg, type='success'){
  targetEl.innerHTML = `<div class="alert alert-${type} py-1 mb-0">${msg}</div>`;
  setTimeout(()=> targetEl.innerHTML = '', 4000);
}

// estado
let pagina = 1;
const limite = 10;

// elementos
const tbody = document.querySelector('#tabela-adolescentes tbody');
const paginaSpan = document.getElementById('pagina-atual');
const filtroNome = document.getElementById('filtro-nome');
const filtroBairro = document.getElementById('filtro-bairro');
const ordenarPor = document.getElementById('ordenar-por');
const ordemEl = document.getElementById('ordem');

// carregar lista
async function carregar(){
  const params = new URLSearchParams();
  params.set('pagina', pagina);
  params.set('limite', limite);
  params.set('ordenar_por', ordenarPor.value);
  params.set('ordem', ordemEl.value);
  if (filtroNome.value) params.set('nome', filtroNome.value);
  if (filtroBairro.value) params.set('bairro', filtroBairro.value);

  try{
    const res = await fetch(`${API_BASE}/?${params.toString()}`);
    if (!res.ok) throw new Error('Falha ao buscar: ' + res.status);
    const data = await res.json();
    renderTabela(data.dados || []);
    paginaSpan.textContent = data.pagina || pagina;
  }catch(err){
    tbody.innerHTML = `<tr><td colspan="6">Erro: ${err.message}</td></tr>`;
  }
}

function renderTabela(items){
  if (!items.length){
    tbody.innerHTML = `<tr><td colspan="6">Nenhum registro encontrado</td></tr>`;
    return;
  }

  tbody.innerHTML = '';
  items.forEach(item => {
    const endereco = item.endereco || {};
    const bairro = endereco.bairro || '';
    const cidade = endereco.cidade || '';

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${item.id ?? ''}</td>
      <td>${escapeHtml(item.nome ?? '')}</td>
      <td>${escapeHtml(item.contato ?? '')}</td>
      <td>${item.data_nasc ?? ''}</td>
      <td>${escapeHtml(bairro)} / ${escapeHtml(cidade)}</td>
      <td>
        <button class="btn btn-sm btn-outline-primary btn-edit" data-id="${item.id}">Editar</button>
        <button class="btn btn-sm btn-outline-danger btn-delete" data-id="${item.id}">Excluir</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function escapeHtml(s){
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

// criar
const formCreate = document.getElementById('form-create');
formCreate.addEventListener('submit', async (e)=>{
  e.preventDefault();
  const btnFeedback = document.getElementById('create-feedback');
  const formData = new FormData(formCreate);
  const payload = {};
  for (let [k,v] of formData.entries()){
    if (!v) continue;
    payload[k] = v;
  }
  // montar endereco JSON
  const endereco = {};
  if (payload.bairro) endereco.bairro = payload.bairro;
  if (payload.cidade) endereco.cidade = payload.cidade;
  if (Object.keys(endereco).length) payload.endereco = endereco;
  delete payload.bairro; delete payload.cidade;

  try{
    const res = await fetch(API_BASE + '/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(JSON.stringify(data));
    showAlert(btnFeedback, 'Cadastro realizado com sucesso', 'success');
    formCreate.reset();
    // fechar collapse
    const collapseEl = document.getElementById('formCadastro');
    const bsCollapse = bootstrap.Collapse.getInstance(collapseEl) || new bootstrap.Collapse(collapseEl, {toggle:false});
    bsCollapse.hide();
    carregar();
  }catch(err){
    showAlert(btnFeedback, 'Erro: ' + err.message, 'danger');
  }
});

// editar - abrir modal
const modalEditar = new bootstrap.Modal(document.getElementById('modalEditar'));
const formEdit = document.getElementById('form-edit');
document.addEventListener('click', async (e)=>{
  if (e.target.matches('.btn-edit')){
    const id = e.target.dataset.id;
    await abrirEditar(id);
  }
  if (e.target.matches('.btn-delete')){
    const id = e.target.dataset.id;
    if (!confirm('Confirmar exclusão do registro #' + id + '?')) return;
    await excluir(id);
  }
});

async function abrirEditar(id){
  try{
    // buscar registro específico usando filtro por nome não existe; vamos buscar listagem e filtrar localmente
    const res = await fetch(`${API_BASE}/?pagina=1&limite=1&ordenar_por=id&ordem=asc`);
    // melhor: chamar endpoint listar filtrando id não disponível -> então pegamos toda página até encontrá-lo
    // implementar tentativa direta de obter pelo id via listar com limite maior
    const resAll = await fetch(`${API_BASE}/?pagina=1&limite=1000`);
    const data = await resAll.json();
    const item = (data.dados || []).find(x => String(x.id) === String(id));
    if (!item) throw new Error('Registro não encontrado');

    // preencher form
    formEdit.elements['id'].value = item.id;
    formEdit.elements['nome'].value = item.nome || '';
    formEdit.elements['nome_pai'].value = item.nome_pai || '';
    formEdit.elements['nome_mae'].value = item.nome_mae || '';
    formEdit.elements['contato'].value = item.contato || '';
    formEdit.elements['data_nasc'].value = item.data_nasc || '';
    formEdit.elements['bairro'].value = (item.endereco && item.endereco.bairro) || '';
    formEdit.elements['cidade'].value = (item.endereco && item.endereco.cidade) || '';

    modalEditar.show();
  }catch(err){
    alert('Erro ao abrir edição: ' + err.message);
  }
}

// salvar edição
document.getElementById('btn-save-edit').addEventListener('click', async ()=>{
  const id = formEdit.elements['id'].value;
  if (!id) return;
  const btnFeedback = document.getElementById('edit-feedback');

  const formData = new FormData(formEdit);
  const payload = {};
  for (let [k,v] of formData.entries()){
    if (k === 'id') continue;
    if (!v) continue;
    payload[k] = v;
  }
  const endereco = {};
  if (payload.bairro) endereco.bairro = payload.bairro;
  if (payload.cidade) endereco.cidade = payload.cidade;
  if (Object.keys(endereco).length) payload.endereco = endereco;
  delete payload.bairro; delete payload.cidade;

  try{
    const res = await fetch(`${API_BASE}/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(JSON.stringify(data));
    showAlert(btnFeedback, 'Atualizado com sucesso', 'success');
    modalEditar.hide();
    carregar();
  }catch(err){
    showAlert(btnFeedback, 'Erro: ' + err.message, 'danger');
  }
});

// excluir
async function excluir(id){
  try{
    const res = await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (!res.ok) throw new Error(JSON.stringify(data));
    alert(data.mensagem || 'Excluído');
    carregar();
  }catch(err){
    alert('Erro ao excluir: ' + err.message);
  }
}

// filtros
document.getElementById('btn-aplicar').addEventListener('click', (e)=>{ e.preventDefault(); pagina = 1; carregar(); });
document.getElementById('btn-reset').addEventListener('click', ()=>{ filtroNome.value = ''; filtroBairro.value = ''; ordenarPor.value = 'id'; ordemEl.value = 'desc'; pagina = 1; carregar(); });

// paginação
document.getElementById('prev').addEventListener('click', ()=>{ if (pagina>1) { pagina--; carregar(); } });
document.getElementById('next').addEventListener('click', ()=>{ pagina++; carregar(); });

// inicial
carregar();
</script>
</body>
</html>
