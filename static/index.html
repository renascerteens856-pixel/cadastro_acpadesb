<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Adolescentes</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f6f7fb;
            margin: 0;
            padding: 0;
        }

        header {
            background: #4e73df;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        h2 { margin-top: 30px; }

        form, .box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-top: 20px;
        }

        label {
            display: block;
            margin: 10px 0 4px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 15px;
            padding: 10px 15px;
            background: #4e73df;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            transition: .3s;
        }
        button:hover {
            background: #2e59d9;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            margin-top: 15px;
        }

        .btn-edit {
            background: #1cc88a;
        }
        .btn-edit:hover {
            background: #17a673;
        }

        .btn-delete {
            background: #e74a3b;
        }
        .btn-delete:hover {
            background: #be3a2c;
        }

        /* Modal */
        #modalEditar {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        #modalContent {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 400px;
        }
    </style>
</head>
<body>

<header>
    <h1>Sistema de Cadastro de Adolescentes</h1>
</header>

<div class="container">

    <!-- Cadastro -->
    <form id="formCadastro">
        <h2>Cadastrar Adolescente</h2>

        <label>Nome:</label>
        <input type="text" id="nome" required />

        <label>Nome do Pai:</label>
        <input type="text" id="nome_pai" />

        <label>Nome da Mãe:</label>
        <input type="text" id="nome_mae" />

        <label>Data de Nascimento:</label>
        <input type="date" id="data_nasc" required />

        <h3>Endereço</h3>
        <label>Rua:</label>
        <input type="text" id="rua" required />

        <label>Número:</label>
        <input type="text" id="numero" required />

        <label>Bairro:</label>
        <input type="text" id="bairro" required />

        <label>Contato:</label>
        <input type="text" id="contato" />

        <button type="submit">Cadastrar</button>
    </form>

    <div id="resultadoCadastro" class="box"></div>

    <!-- Buscar -->
    <div class="box">
        <h2>Buscar por Nome</h2>
        <input type="text" id="buscarNome" placeholder="Digite o nome">
        <button onclick="buscarPorNome()">Buscar</button>
        <div id="resultadoBusca"></div>
    </div>

    <!-- Listar -->
    <div class="box">
        <h2>Listar Todos</h2>
        <button onclick="listarTodos()">Carregar Lista</button>
        <div id="listaTodos"></div>
    </div>

</div>

<!-- Modal de edição -->
<div id="modalEditar">
    <div id="modalContent">
        <h3>Editar Adolescente</h3>

        <input type="hidden" id="edit_id">

        <label>Nome:</label>
        <input type="text" id="edit_nome">

        <label>Bairro:</label>
        <input type="text" id="edit_bairro">

        <label>Contato:</label>
        <input type="text" id="edit_contato">

        <button class="btn-edit" onclick="salvarEdicao()">Salvar</button>
        <button onclick="fecharModal()">Cancelar</button>
    </div>
</div>

<script>
const API = "https://cadastro-adolescentes.onrender.com/adolescentes";

function formatarData(dataISO) {
    if (!dataISO) return "-";
    const d = new Date(dataISO);
    return d.toLocaleDateString("pt-BR");
}

document.getElementById("formCadastro").addEventListener("submit", async (e) => {
    e.preventDefault();

    const data = {
        nome: nome.value,
        nome_pai: nome_pai.value,
        nome_mae: nome_mae.value,
        data_nasc: data_nasc.value,
        contato: contato.value,
        endereco: {
            rua: rua.value,
            numero: numero.value,
            bairro: bairro.value
        }
    };

    const resp = await fetch(API + "/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    const json = await resp.json();
    resultadoCadastro.innerHTML = "<pre>" + JSON.stringify(json, null, 2) + "</pre>";
});


async function listarTodos() {
    const resp = await fetch(API + "/");
    const json = await resp.json();

    listaTodos.innerHTML = "";

    json.dados.forEach(a => {
        listaTodos.innerHTML += `
            <div class="card">
                <strong>${a.nome}</strong> (ID: ${a.id})<br>
                Bairro: ${a.endereco?.bairro || "-"}<br>
                Contato: ${a.contato || "-"}<br>
                Nascimento: ${formatarData(a.data_nasc)}<br><br>

                <button class="btn-edit" onclick="abrirModal(${a.id}, '${a.nome}', '${a.endereco?.bairro || ""}', '${a.contato || ""}')">Editar</button>
                <button class="btn-delete" onclick="deletar(${a.id})">Excluir</button>
            </div>
        `;
    });
}


async function buscarPorNome() {
    const nome = buscarNome.value;

    const resp = await fetch(API + `/buscar?nome=${nome}`);
    const json = await resp.json();

    resultadoBusca.innerHTML = "";

    if (!Array.isArray(json)) {
        resultadoBusca.innerHTML = `<pre>${JSON.stringify(json, null, 2)}</pre>`;
        return;
    }

    json.forEach(a => {
        resultadoBusca.innerHTML += `
            <div class="card">
                <strong>${a.nome}</strong><br>
                Bairro: ${a.endereco?.bairro || "-"}<br>
                Nascimento: ${formatarData(a.data_nasc)}
            </div>
        `;
    });
}


function abrirModal(id, nome, bairro, contato) {
    modalEditar.style.display = "flex";
    edit_id.value = id;
    edit_nome.value = nome;
    edit_bairro.value = bairro;
    edit_contato.value = contato;
}

function fecharModal() {
    modalEditar.style.display = "none";
}

async function salvarEdicao() {
    const id = edit_id.value;

    const dadosAtualizados = {
        nome: edit_nome.value,
        contato: edit_contato.value,
        endereco: {
            bairro: edit_bairro.value
        }
    };

    await fetch(API + "/" + id, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(dadosAtualizados)
    });

    fecharModal();
    listarTodos();
}

async function deletar(id) {
    if (!confirm("Deseja realmente excluir?")) return;

    await fetch(API + "/" + id, { method: "DELETE" });
    listarTodos();
}
</script>

</body>
</html>
