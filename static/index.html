<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro de Adolescentes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #eef1f5;
        }

        .card {
            border-radius: 14px;
        }

        .table thead {
            background: #0d6efd;
            color: white;
        }

        .modal-header {
            background: #0d6efd;
            color: white;
        }

        .pointer {
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="container py-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-people-fill"></i> Cadastro de Adolescentes</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalCadastro">
                <i class="bi bi-plus-circle"></i> Novo Cadastro
            </button>
        </div>

        <!-- Busca -->
        <div class="mb-3">
            <input id="buscarNome" type="text" class="form-control" placeholder="Buscar por nome...">
        </div>

        <!-- Tabela -->
        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-hover table-bordered">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Contato</th>
                            <th>Endereço</th>
                            <th>Nascimento</th>
                            <th width="120">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaTabela"></tbody>
                </table>
            </div>
        </div>
    </div>


    <!-- MODAL CADASTRO -->
    <div class="modal fade" id="modalCadastro" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Novo Adolescente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <label>Nome</label>
                    <input id="nome" class="form-control mb-2">

                    <label>Nome do Pai</label>
                    <input id="nome_pai" class="form-control mb-2">

                    <label>Nome da Mãe</label>
                    <input id="nome_mae" class="form-control mb-2">

                    <label>Contato</label>
                    <input id="contato" class="form-control mb-3">

                    <h5>Endereço</h5>
                    <div class="row g-2">
                        <div class="col-md-5">
                            <label>Rua</label>
                            <input id="rua" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label>Número</label>
                            <input id="numero" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label>Bairro</label>
                            <input id="bairro" class="form-control">
                        </div>
                    </div>

                    <label class="mt-3">Data de Nascimento</label>
                    <input type="date" id="data_nasc" class="form-control">

                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-success" onclick="cadastrar()">Salvar</button>
                </div>

            </div>
        </div>
    </div>


    <!-- MODAL EDIÇÃO -->
    <div class="modal fade" id="modalEditar" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Editar Adolescente</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden" id="edit_id">

                    <label>Nome</label>
                    <input id="edit_nome" class="form-control mb-2">

                    <label>Contato</label>
                    <input id="edit_contato" class="form-control mb-2">

                    <h5>Endereço</h5>
                    <div class="row g-2">
                        <div class="col-md-5">
                            <label>Rua</label>
                            <input id="edit_rua" class="form-control">
                        </div>

                        <div class="col-md-3">
                            <label>Número</label>
                            <input id="edit_numero" class="form-control">
                        </div>

                        <div class="col-md-4">
                            <label>Bairro</label>
                            <input id="edit_bairro" class="form-control">
                        </div>
                    </div>

                    <label class="mt-3">Data de Nascimento</label>
                    <input type="date" id="edit_data_nasc" class="form-control">

                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-warning" onclick="salvarEdicao()">Salvar Alterações</button>
                </div>

            </div>
        </div>
    </div>


    <!-- Bootstrap & JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const API = "https://cadastro-adolescentes.onrender.com/adolescentes";

        // ---------------------------
        // LISTAR
        // ---------------------------
        async function listarTodos() {
            const resp = await fetch(API + "/");

            const json = await resp.json().catch(() => null);
            if (!json || !json.dados) return;

            const tabela = document.getElementById("listaTabela");
            tabela.innerHTML = "";

            json.dados.forEach(item => {
                const end = item.endereco || {};
                const enderecoTexto = `${end.rua || ""}, ${end.numero || ""} - ${end.bairro || ""}`;

                const data = item.data_nasc
                    ? new Date(item.data_nasc).toLocaleDateString("pt-BR")
                    : "-";

                tabela.innerHTML += `
                    <tr>
                        <td>${item.nome}</td>
                        <td>${item.contato || "-"}</td>
                        <td>${enderecoTexto}</td>
                        <td>${data}</td>
                        <td>
                            <button class="btn btn-sm btn-warning" onclick='abrirEdicao(${item.id})'>
                                <i class="bi bi-pencil-square"></i>
                            </button>
                            <button class="btn btn-sm btn-danger" onclick="deletar(${item.id})">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        // ---------------------------
        // CADASTRAR
        // ---------------------------
        async function cadastrar() {
            const body = {
                nome: nome.value,
                nome_pai: nome_pai.value,
                nome_mae: nome_mae.value,
                contato: contato.value,
                endereco: {
                    rua: rua.value,
                    numero: numero.value,
                    bairro: bairro.value,
                },
                data_nasc: data_nasc.value
            };

            await fetch(API + "/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });

            listarTodos();
            bootstrap.Modal.getInstance(modalCadastro).hide();
        }

        // ---------------------------
        // ABRIR EDIÇÃO
        // ---------------------------
        async function abrirEdicao(id) {
            const resp = await fetch(API + `/buscar?nome=`); // apenas para obter o registro
            const todos = await fetch(API + "/").then(r => r.json());
            const found = todos.dados.find(x => x.id === id);

            const e = found.endereco || {};

            edit_id.value = found.id;
            edit_nome.value = found.nome;
            edit_contato.value = found.contato || "";
            edit_rua.value = e.rua || "";
            edit_numero.value = e.numero || "";
            edit_bairro.value = e.bairro || "";
            edit_data_nasc.value = found.data_nasc ? found.data_nasc.substring(0, 10) : "";

            new bootstrap.Modal(modalEditar).show();
        }

        // ---------------------------
        // SALVAR EDIÇÃO
        // ---------------------------
        async function salvarEdicao() {
            const id = edit_id.value;

            const body = {
                nome: edit_nome.value,
                contato: edit_contato.value,
                data_nasc: edit_data_nasc.value,
                endereco: {
                    rua: edit_rua.value,
                    numero: edit_numero.value,
                    bairro: edit_bairro.value,
                }
            };

            await fetch(`${API}/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });

            listarTodos();
            bootstrap.Modal.getInstance(modalEditar).hide();
        }

        // ---------------------------
        // DELETAR
        // ---------------------------
        async function deletar(id) {
            if (!confirm("Deseja realmente excluir?")) return;
            await fetch(`${API}/${id}`, { method: "DELETE" });
            listarTodos();
        }

        // ---------------------------
        // BUSCA
        // ---------------------------
        buscarNome.addEventListener("input", async () => {
            const nome = buscarNome.value.trim();
            if (nome.length < 2) return listarTodos();

            const resp = await fetch(API + `/buscar?nome=${nome}`);
            const dados = await resp.json();

            const tabela = document.getElementById("listaTabela");
            tabela.innerHTML = "";

            dados.forEach(item => {
                const end = item.endereco || {};
                const enderecoTexto = `${end.rua || ""}, ${end.numero || ""} - ${end.bairro || ""}`;

                const data = item.data_nasc
                    ? new Date(item.data_nasc).toLocaleDateString("pt-BR")
                    : "-";

                tabela.innerHTML += `
                    <tr>
                        <td>${item.nome}</td>
                        <td>${item.contato || "-"}</td>
                        <td>${enderecoTexto}</td>
                        <td>${data}</td>
                    </tr>
                `;
            });
        });

        listarTodos();
    </script>

</body>

</html>
