<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cadastro de Adolescentes</title>

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body { background: #f5f5f5; }
    .container-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .logo-img { width: 160px; display:block; margin:10px auto 20px; }
  </style>
</head>
<body>

<div class="container mt-4">

  <!-- LOGO -->
  <img src="Images/logo_adolescentes.PNG" alt="Logo" class="logo-img">

  <h2 class="text-center mb-3">Cadastro de Adolescentes</h2>

  <!-- FORMULÁRIO (ainda sem JS) -->
  <div class="container-box">
    <div class="row g-3">
      <div class="col-md-8">
        <label>Nome completo</label>
        <input class="form-control" />
      </div>

      <div class="col-md-4">
        <label>Contato</label>
        <input class="form-control" />
      </div>

      <div class="col-md-6">
        <label>Nome do Pai</label>
        <input class="form-control" />
      </div>

      <div class="col-md-6">
        <label>Nome da Mãe</label>
        <input class="form-control" />
      </div>

      <div class="col-md-4">
        <label>Data de Nascimento</label>
        <input type="date" class="form-control" />
      </div>

      <h5 class="mt-3">Endereço</h5>

      <div class="col-md-6">
        <label>Rua</label>
        <input class="form-control" />
      </div>

      <div class="col-md-3">
        <label>Número</label>
        <input class="form-control" />
      </div>

      <div class="col-md-3">
        <label>Bairro</label>
        <input class="form-control" />
      </div>

      <div class="col-12 mt-3">
        <button class="btn btn-primary w-100">Salvar</button>
      </div>
    </div>
  </div>

  <!-- BUSCA -->
  <div class="container-box mt-3">
    <div class="row g-2">
      <div class="col-md-8">
        <input class="form-control" placeholder="Buscar por nome..." />
      </div>

      <div class="col-md-2">
        <button class="btn btn-outline-primary w-100">Pesquisar</button>
      </div>

      <div class="col-md-2">
        <button class="btn btn-secondary w-100">Listar Todos</button>
      </div>
    </div>
  </div>

  <!-- ÁREA DA LISTA (ainda vazia) -->
  <div id="lista" class="container-box mt-3">
    <p class="text-center">Nenhum dado carregado ainda.</p>
  </div>

</div>

</body>
</html>
