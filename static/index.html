<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Adolescentes</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: #f7f7f7; }
    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px #0001;
      margin-bottom: 25px;
    }
  </style>
</head>

<body>

<div class="container mt-4">

  <h2 class="text-center mb-4">Cadastro de Adolescentes</h2>

  <!-- FORMULÁRIO -->
  <div class="box">
    <div class="row g-3">

      <div class="col-md-8">
        <label class="form-label">Nome completo</label>
        <input id="nome" class="form-control">
      </div>

      <div class="col-md-4">
        <label class="form-label">Idade</label>
        <input id="idade" type="number" class="form-control">
      </div>

      <div class="col-md-6">
        <label class="form-label">Nome do Pai</label>
        <input id="nome_pai" class="form-control">
      </div>

      <div class="col-md-6">
        <label class="form-label">Nome da Mãe</label>
        <input id="nome_mae" class="form-control">
      </div>

      <div class="col-md-6">
        <label class="form-label">Contato</label>
        <input id="contato" class="form-control" maxlength="15">
      </div>

      <h5 class="mt-3">Endereço</h5>

      <div class="col-md-6">
        <label class="form-label">Rua</label>
        <input id="rua" class="form-control">
      </div>

      <div class="col-md-3">
        <label class="form-label">Número</label>
        <input id="numero" class="form-control">
      </div>

      <div class="col-md-3">
        <label class="form-label">Bairro</label>
        <input id="bairro" class="form-control">
      </div>

      <div class="col-12 mt-3">
        <button onclick="salvarAdolescente()" class="btn btn-primary w-100">Salvar</button>
      </div>

    </div>
  </div>

  <!-- BUSCA -->
  <div class="box">
    <div class="row g-2">
      <div class="col-md-8">
        <input id="busca_nome" class="form-control" placeholder="Buscar por nome...">
      </div>
      <div class="col-md-2">
        <button onclick="buscar()" class="btn btn-outline-primary w-100">Pesquisar</button>
      </div>
      <div class="col-md-2">
        <button onclick="listarTodos()" class="btn btn-secondary w-100">Listar Todos</button>
      </div>
    </div>
  </div>

  <div id="lista" class="box"></div>

</div>

<!-- MODAL EDITAR -->
<div class="modal fade" id="modalEditar" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Editar Adolescente</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input type="hidden" id="edit_id">

        <div class="row g-3">

          <div class="col-md-8">
            <label class="form-label">Nome completo</label>
            <input id="edit_nome" class="form-control">
          </div>

          <div class="col-md-4">
            <label class="form-label">Idade</label>
            <input id="edit_idade" type="number" class="form-control">
          </div>

          <div class="col-md-6">
            <label class="form-label">Nome do Pai</label>
            <input id="edit_nome_pai" class="form-control">
          </div>

          <div class="col-md-6">
            <label class="form-label">Nome da Mãe</label>
            <input id="edit_nome_mae" class="form-control">
          </div>

          <div class="col-md-6">
            <label class="form-label">Contato</label>
            <input id="edit_contato" class="form-control">
          </div>

          <h5 class="mt-3">Endereço</h5>

          <div class="col-md-6">
            <label class="form-label">Rua</label>
            <input id="edit_rua" class="form-control">
          </div>

          <div class="col-md-3">
            <label class="form-label">Número</label>
            <input id="edit_numero" class="form-control">
          </div>

          <div class="col-md-3">
            <label class="form-label">Bairro</label>
            <input id="edit_bairro" class="form-control">
          </div>

        </div>
      </div>

      <div class="modal-footer">
        <button onclick="salvarEdicao()" class="btn btn-primary">Salvar Alterações</button>
      </div>

    </div>
  </div>
</div>


<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API = "https://cadastro-adolescentes.onrender.com";

/* ================= MÁSCARA DE CONTATO ================= */
function maskContato(v) {
  v = v.replace(/\D/g, "");
  v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
  v = v.replace(/(\d{5})(\d)/, "$1-$2");
  return v;
}
contato.addEventListener("input", e => e.target.value = maskContato(e.target.value));
edit_contato.addEventListener("input", e => e.target.value = maskContato(e.target.value));

/* ================= LISTAR ================= */
async function listarTodos() {
  const res = await fetch(`${API}/adolescentes`);
  const dados = await res.json();
  mostrarLista(dados);
}

/* ================= BUSCAR ================= */
async function buscar() {
  const nome = busca_nome.value.trim();
  if (!nome) return listarTodos();

  const res = await fetch(`${API}/adolescentes?nome=${nome}`);
  mostrarLista(await res.json());
}

/* ================= CADASTRAR ================= */
async function salvarAdolescente() {
  const payload = {
    nome: nome.value,
    idade: idade.value,
    nome_pai: nome_pai.value,
    nome_mae: nome_mae.value,
    contato: contato.value,
    endereco: {
      rua: rua.value,
      numero: numero.value,
      bairro: bairro.value
    }
  };

  await fetch(`${API}/adolescentes`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  });

  listarTodos();
}

/* ================= EDITAR ================= */
async function editar(id) {
  const res = await fetch(`${API}/adolescentes/${id}`);
  const d = await res.json();

  edit_id.value = d.id;
  edit_nome.value = d.nome;
  edit_idade.value = d.idade;

  edit_nome_pai.value = d.nome_pai;
  edit_nome_mae.value = d.nome_mae;

  edit_contato.value = d.contato;

  edit_rua.value = d.endereco?.rua || "";
  edit_numero.value = d.endereco?.numero || "";
  edit_bairro.value = d.endereco?.bairro || "";

  new bootstrap.Modal(modalEditar).show();
}

/* ================= SALVAR ALTERAÇÃO ================= */
async function salvarEdicao() {
  const id = edit_id.value;

  const payload = {
    nome: edit_nome.value,
    idade: edit_idade.value,
    nome_pai: edit_nome_pai.value,
    nome_mae: edit_nome_mae.value,
    contato: edit_contato.value,
    endereco: {
      rua: edit_rua.value,
      numero: edit_numero.value,
      bairro: edit_bairro.value
    }
  };

  await fetch(`${API}/adolescentes/${id}`, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  });

  listarTodos();
}

/* ================= DELETAR ================= */
async function deletar(id) {
  if (!confirm("Deseja excluir este registro?")) return;

  await fetch(`${API}/adolescentes/${id}`, {
    method: "DELETE"
  });

  listarTodos();
}

/* ================= IMPRIMIR ================= */
function imprimirRegistro(d) {
  const html = `
  <html>
  <head>
    <title>Ficha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="container mt-3">
      <h3 class="text-center">Ficha do Adolescente</h3>
      <hr>
      <p><strong>Nome:</strong> ${d.nome}</p>
      <p><strong>Idade:</strong> ${d.idade}</p>
      <p><strong>Pai:</strong> ${d.nome_pai}</p>
      <p><strong>Mãe:</strong> ${d.nome_mae}</p>
      <p><strong>Contato:</strong> ${d.contato}</p>
      <p><strong>Endereço:</strong> ${d.endereco?.rua || ""}, ${d.endereco?.numero || ""} - ${d.endereco?.bairro || ""}</p>
    </div>
    <script>
      window.onload = () => { window.print(); window.onafterprint = () => window.close(); }
    <\/script>
  </body>
  </html>`;

  const w = window.open();
  w.document.write(html);
  w.document.close();
}

/* ================= MONTAR LISTA ================= */
function mostrarLista(lista) {
  let html = `
    <table class="table table-striped">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Idade</th>
          <th>Contato</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
  `;

  lista.forEach(d => {
    html += `
      <tr>
        <td>${d.nome}</td>
        <td>${d.idade}</td>
        <td>${d.contato}</td>
        <td>
          <button class="btn btn-warning btn-sm" onclick="editar(${d.id})">Editar</button>
          <button class="btn btn-danger btn-sm" onclick="deletar(${d.id})">Excluir</button>
          <button class="btn btn-primary btn-sm" onclick='imprimirRegistro(${JSON.stringify(d)})'>Imprimir</button>
        </td>
      </tr>
    `;
  });

  html += "</tbody></table>";
  document.getElementById("lista").innerHTML = html;
}

document.addEventListener("DOMContentLoaded", listarTodos);
</script>

</body>
</html>
