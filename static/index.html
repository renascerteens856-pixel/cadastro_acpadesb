<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Buscar Adolescentes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">
    <h2 class="mb-4">Buscar Adolescentes</h2>

    <!-- Campo de busca -->
    <div class="input-group mb-3">
        <input id="campoBusca" type="text" class="form-control" placeholder="Digite um nome para buscar...">
        <button class="btn btn-primary" onclick="buscar()">Buscar</button>
    </div>

    <!-- Área onde aparecerá o resultado -->
    <div id="resultado"></div>
</div>

<script>
async function buscar() {
    const nome = document.getElementById("campoBusca").value.trim();
    const divResultado = document.getElementById("resultado");

    if (!nome) {
        divResultado.innerHTML = `<div class="alert alert-warning">Digite um nome para buscar.</div>`;
        return;
    }

    divResultado.innerHTML = "<p>Carregando...</p>";

    try {
        const resp = await fetch(`https://cadastro-adolescentes.onrender.com/adolescentes/buscar?nome=${encodeURIComponent(nome)}`);

        if (!resp.ok) {
            divResultado.innerHTML = `<div class="alert alert-danger">Erro ao buscar.</div>`;
            return;
        }

        const dados = await resp.json();

        if (dados.length === 0) {
            divResultado.innerHTML = `<div class="alert alert-info">Nenhum resultado encontrado.</div>`;
            return;
        }

        let html = `
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Idade</th>
                        <th>Cidade</th>
                        <th>Telefone</th>
                    </tr>
                </thead>
                <tbody>
        `;

        dados.forEach(item => {
            html += `
                <tr>
                    <td>${item.nome}</td>
                    <td>${item.idade || "-"}</td>
                    <td>${item.cidade || "-"}</td>
                    <td>${item.telefone || "-"}</td>
                </tr>
            `;
        });

        html += "</tbody></table>";

        divResultado.innerHTML = html;

    } catch (error) {
        divResultado.innerHTML = `<div class="alert alert-danger">Erro inesperado: ${error}</div>`;
    }
}
</script>

</body>
</html>
