<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ACPADESB</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background:#f4f4f4; }
        #logoTopo { display:block; margin:20px auto; max-width:220px; }
        .card { margin-top:20px; }
        table th, table td { text-align:center; vertical-align:middle; }
    </style>
</head>

<body>

<img id="logoTopo" src="/static/Images/ACP_Escuro.png">

<div class="container">

<ul class="nav nav-tabs">
    <li class="nav-item">
        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#abaAdolescentes">
            Adolescentes
        </button>
    </li>
    <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#abaCongregacoes">
            Congregações
        </button>
    </li>
</ul>

<div class="tab-content">

<!-- ================= ADOLESCENTES ================= -->
<div class="tab-pane fade show active" id="abaAdolescentes">
<div class="card shadow">

<div class="card-header d-flex justify-content-between">
    <h5>Adolescentes</h5>
    <button class="btn btn-success" onclick="novoAdolescente()">Novo</button>
</div>

<div class="card-body">
<table class="table table-bordered table-striped">
<thead class="table-dark">
<tr>
    <th>Nome</th>
    <th>CPF</th>
    <th>Contato</th>
    <th>Data</th>
    <th>Congregação</th>
    <th>Ações</th>
</tr>
</thead>
<tbody id="listaAdolescentes"></tbody>
</table>
</div>
</div>
</div>

<!-- ================= CONGREGAÇÕES ================= -->
<div class="tab-pane fade" id="abaCongregacoes">
<div class="card shadow">

<div class="card-header d-flex justify-content-between">
    <h5>Congregações</h5>
    <button class="btn btn-success" onclick="novaCongregacao()">Nova</button>
</div>

<div class="card-body">
<table class="table table-bordered table-striped">
<thead class="table-dark">
<tr>
    <th>Nome</th>
    <th>Ações</th>
</tr>
</thead>
<tbody id="listaCongregacoes"></tbody>
</table>
</div>
</div>
</div>

</div>
</div>

<!-- ================= MODAL ADOLESCENTE ================= -->
<div class="modal fade" id="modalAdolescente">
<div class="modal-dialog">
<form class="modal-content" onsubmit="salvarAdolescente(event)">

<div class="modal-header">
    <h5 id="tituloAdolescente"></h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
<input type="hidden" id="adolescenteId">

<input class="form-control mb-2" id="nome" placeholder="Nome" required>
<input class="form-control mb-2" id="cpf" placeholder="CPF">
<input class="form-control mb-2" id="contato" placeholder="Contato">
<input type="date" class="form-control mb-2" id="data_nasc">

<select class="form-control mb-2" id="congregacao"></select>
</div>

<div class="modal-footer">
<button class="btn btn-primary" type="submit">Salvar</button>
</div>

</form>
</div>
</div>

<!-- ================= MODAL CONGREGAÇÃO ================= -->
<div class="modal fade" id="modalCongregacao">
<div class="modal-dialog">
<form class="modal-content" onsubmit="salvarCongregacao(event)">

<div class="modal-header">
    <h5 id="tituloCongregacao"></h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
<input type="hidden" id="congregacaoId">
<input class="form-control" id="congregacaoNome" placeholder="Nome" required>
</div>

<div class="modal-footer">
<button class="btn btn-primary" type="submit">Salvar</button>
</div>

</form>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API_A = "http://127.0.0.1:5000/adolescentes/";
const API_C = "http://127.0.0.1:5000/congregacoes/";

const modalA = new bootstrap.Modal(document.getElementById("modalAdolescente"));
const modalC = new bootstrap.Modal(document.getElementById("modalCongregacao"));

let mapaCongregacoes = {}; // 🔥 ID -> NOME

const formatarData = d => d ? d.split("-").reverse().join("/") : "";

/* ================= CONGREGAÇÕES ================= */

async function carregarCongregacoes(){
    const resp = await fetch(API_C);
    const dados = await resp.json();

    mapaCongregacoes = {};
    congregacao.innerHTML = "";

    dados.forEach(c => {
        mapaCongregacoes[c.id] = c.nome;
        congregacao.innerHTML += `<option value="${c.id}">${c.nome}</option>`;
    });

    listaCongregacoes.innerHTML = "";
    dados.forEach(c => {
        listaCongregacoes.innerHTML += `
        <tr>
            <td>${c.nome}</td>
            <td>
                <button class="btn btn-sm btn-primary" onclick="editarCongregacao(${c.id})">Editar</button>
                <button class="btn btn-sm btn-danger" onclick="excluirCongregacao(${c.id})">Excluir</button>
            </td>
        </tr>`;
    });
}

/* ================= ADOLESCENTES ================= */

function novoAdolescente(){
    adolescenteId.value="";
    document.querySelector("#modalAdolescente form").reset();
    tituloAdolescente.innerText="Novo Adolescente";
    modalA.show();
}

async function listarAdolescentes(){
    const resp = await fetch(API_A);
    const dados = await resp.json();

    listaAdolescentes.innerHTML="";

    dados.forEach(a => {
        listaAdolescentes.innerHTML += `
        <tr>
            <td>${a.nome}</td>
            <td>${a.cpf || "-"}</td>
            <td>${a.contato || "-"}</td>
            <td>${formatarData(a.data_nasc)}</td>
            <td>${mapaCongregacoes[a.congregacao] || "-"}</td>
            <td>
                <button class="btn btn-sm btn-primary" onclick="editarAdolescente(${a.id})">Editar</button>
                <button class="btn btn-sm btn-danger" onclick="excluirAdolescente(${a.id})">Excluir</button>
            </td>
        </tr>`;
    });
}

async function salvarAdolescente(e){
    e.preventDefault();
    const id = adolescenteId.value;

    await fetch(id ? API_A+id : API_A,{
        method: id ? "PUT" : "POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            nome:nome.value,
            cpf:cpf.value,
            contato:contato.value,
            data_nasc:data_nasc.value,
            congregacao:congregacao.value
        })
    });

    modalA.hide();
    listarAdolescentes();
}

async function editarAdolescente(id){
    const dados = await (await fetch(API_A)).json();
    const a = dados.find(x=>x.id===id);

    adolescenteId.value=id;
    nome.value=a.nome;
    cpf.value=a.cpf||"";
    contato.value=a.contato||"";
    data_nasc.value=a.data_nasc||"";
    congregacao.value=a.congregacao;

    tituloAdolescente.innerText="Editar Adolescente";
    modalA.show();
}

async function excluirAdolescente(id){
    if(confirm("Excluir adolescente?")){
        await fetch(API_A+id,{method:"DELETE"});
        listarAdolescentes();
    }
}

/* ================= INIT ================= */

document.addEventListener("DOMContentLoaded", async ()=>{
    await carregarCongregacoes();   // 🔥 carrega primeiro
    await listarAdolescentes();     // 🔥 depois lista adolescentes
});
</script>

</body>
</html>
