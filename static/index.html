<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <title>ACPADESB</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <style>
        body { background: #f4f4f4; }
        .card { margin-top: 20px; }
        #logoTopo {
            display: block;
            margin: 20px auto;
            max-width: 250px;
        }
    </style>
</head>

<body>
<img id="logoTopo" src="static/Images/ACP_Escuro.png"/>

<div class="container">

    <!-- TABS -->
    <ul class="nav nav-tabs" id="tabs">
        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabAdolescentes">
                Adolescentes
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabCongregacoes">
                Congregações
            </button>
        </li>
    </ul>

    <div class="tab-content">

        <!-- ================= ADOLESCENTES ================= -->
        <div class="tab-pane fade show active" id="tabAdolescentes">
            <div class="card shadow">
                <div class="card-header bg-primary text-white d-flex justify-content-between">
                    <h5>Adolescentes</h5>
                    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalAdolescente">
                        Novo
                    </button>
                </div>

                <div class="card-body">
                    <table class="table table-bordered text-center">
                        <thead class="table-dark">
                            <tr>
                                <th>Nome</th>
                                <th>Pai</th>
                                <th>Mãe</th>
                                <th>Contato</th>
                                <th>Data Nasc.</th>
                                <th>Endereço</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="lista-adolescentes"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ================= CONGREGAÇÕES ================= -->
        <div class="tab-pane fade" id="tabCongregacoes">
            <div class="card shadow">
                <div class="card-header bg-success text-white d-flex justify-content-between">
                    <h5>Congregações</h5>
                    <button class="btn btn-light" data-bs-toggle="modal" data-bs-target="#modalCongregacao">
                        Nova
                    </button>
                </div>

                <div class="card-body">
                    <table class="table table-bordered text-center">
                        <thead class="table-dark">
                            <tr>
                                <th>Nome</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="lista-congregacoes"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- ================= MODAL CONGREGAÇÃO ================= -->
<div class="modal fade" id="modalCongregacao">
    <div class="modal-dialog">
        <form id="formCongregacao" class="modal-content">
            <div class="modal-header">
                <h5 id="modalCongregacaoLabel">Congregação</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <input type="hidden" id="congregacaoId">
                <input type="text" id="congregacaoNome" class="form-control" placeholder="Nome" required>
            </div>

            <div class="modal-footer">
                <button class="btn btn-primary">Salvar</button>
            </div>
        </form>
    </div>
</div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ================= CONFIG ================= */
const API_ADO = "http://127.0.0.1:5000/adolescentes/";
const API_CONG = "http://127.0.0.1:5000/congregacoes/";

/* ================= DATAS ================= */
function formatarDataBR(d) {
    if (!d) return "-";
    const x = new Date(d + "T00:00:00");
    return x.toLocaleDateString("pt-BR");
}

/* ================= CONGREGAÇÕES ================= */
async function listarCongregacoes() {
    const res = await fetch(API_CONG);
    const dados = await res.json();

    const tbody = document.getElementById("lista-congregacoes");
    tbody.innerHTML = "";

    dados.forEach(c => {
        tbody.innerHTML += `
            <tr>
                <td>${c.nome}</td>
                <td>
                    <button class="btn btn-sm btn-primary" onclick="editarCongregacao(${c.id})">Editar</button>
                    <button class="btn btn-sm btn-danger" onclick="excluirCongregacao(${c.id})">Excluir</button>
                </td>
            </tr>
        `;
    });
}

async function editarCongregacao(id) {
    const res = await fetch(API_CONG + id);
    const c = await res.json();

    document.getElementById("congregacaoId").value = id;
    document.getElementById("congregacaoNome").value = c.nome;
    document.getElementById("modalCongregacaoLabel").innerText = "Editar Congregação";

    new bootstrap.Modal(document.getElementById("modalCongregacao")).show();
}

async function excluirCongregacao(id) {
    if (!confirm("Excluir congregação?")) return;
    await fetch(API_CONG + id, { method: "DELETE" });
    listarCongregacoes();
}

document.getElementById("formCongregacao").onsubmit = async e => {
    e.preventDefault();

    const id = congregacaoId.value;
    const metodo = id ? "PUT" : "POST";
    const url = id ? API_CONG + id : API_CONG;

    await fetch(url, {
        method: metodo,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nome: congregacaoNome.value })
    });

    bootstrap.Modal.getInstance(modalCongregacao).hide();
    listarCongregacoes();
};

/* ================= ADOLESCENTES (LISTAGEM) ================= */
async function listarAdolescentes() {
    const res = await fetch(API_ADO);
    const dados = await res.json();

    const tbody = document.getElementById("lista-adolescentes");
    tbody.innerHTML = "";

    dados.forEach(a => {
        tbody.innerHTML += `
            <tr>
                <td>${a.nome}</td>
                <td>${a.nome_pai || "-"}</td>
                <td>${a.nome_mae || "-"}</td>
                <td>${a.contato || "-"}</td>
                <td>${formatarDataBR(a.data_nasc)}</td>
                <td>${a.endereco?.rua || "-"}, ${a.endereco?.numero || "-"}, ${a.endereco?.bairro || "-"}</td>
                <td>
                    <button class="btn btn-sm btn-danger" onclick="excluirAdolescente(${a.id})">Excluir</button>
                </td>
            </tr>
        `;
    });
}

async function excluirAdolescente(id) {
    if (!confirm("Excluir adolescente?")) return;
    await fetch(API_ADO + id, { method: "DELETE" });
    listarAdolescentes();
}

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", () => {
    listarAdolescentes();
    listarCongregacoes();
});
</script>

</body>
</html>
