<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <title>ACPADESB</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
        body { background: #f4f4f4; }
        .card { margin-top: 30px; }
        #logoTopo {
            display: block;
            margin: 20px auto;
            max-width: 220px;
        }
    </style>
</head>

<body>
<img id="logoTopo" src="static/Images/ACP_Escuro.png" />

<div class="container">

    <!-- ABAS -->
    <ul class="nav nav-tabs">
        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabAdolescentes">
                Adolescentes
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabCongregacoes">
                Congregações
            </button>
        </li>
    </ul>

    <div class="tab-content">

        <!-- ================= ADOLESCENTES ================= -->
        <div class="tab-pane fade show active" id="tabAdolescentes">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    Lista de Adolescentes
                </div>
                <div class="card-body">
                    <p class="text-muted">CRUD já existente</p>
                </div>
            </div>
        </div>

        <!-- ================= CONGREGAÇÕES ================= -->
        <div class="tab-pane fade" id="tabCongregacoes">
            <div class="card shadow">
                <div class="card-header bg-success text-white d-flex justify-content-between">
                    <span>Congregações</span>
                    <button class="btn btn-light btn-sm" onclick="novaCongregacao()">
                        Nova Congregação
                    </button>
                </div>

                <div class="card-body">
                    <table class="table table-bordered text-center">
                        <thead class="table-dark">
                            <tr>
                                <th>Nome</th>
                                <th width="180">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="lista-congregacoes"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- ================= MODAL CONGREGAÇÃO ================= -->
<div class="modal fade" id="modalCongregacao">
    <div class="modal-dialog">
        <form id="formCongregacao" class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalCongregacaoLabel">
                    Cadastrar Congregação
                </h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <input type="hidden" id="congregacaoId" />

                <label class="form-label">Nome</label>
                <input type="text" id="congregacaoNome" class="form-control" required />
            </div>

            <div class="modal-footer">
                <button class="btn btn-primary" type="submit">Salvar</button>
                <button class="btn btn-secondary" data-bs-dismiss="modal" type="button">
                    Cancelar
                </button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API_CONGREGACOES = "http://127.0.0.1:5000/congregacoes/";

/* ================= LISTAR ================= */
async function listarCongregacoes() {
    const res = await fetch(API_CONGREGACOES);
    const dados = await res.json();

    const tbody = document.getElementById("lista-congregacoes");
    tbody.innerHTML = "";

    dados.forEach(item => {
        tbody.innerHTML += `
            <tr>
                <td>${item.nome}</td>
                <td>
                    <button class="btn btn-sm btn-primary"
                        onclick="editarCongregacao(${item.id})">
                        Editar
                    </button>
                    <button class="btn btn-sm btn-danger"
                        onclick="excluirCongregacao(${item.id})">
                        Excluir
                    </button>
                </td>
            </tr>
        `;
    });
}

/* ================= NOVA ================= */
function novaCongregacao() {
    document.getElementById("congregacaoId").value = "";
    document.getElementById("congregacaoNome").value = "";
    document.getElementById("modalCongregacaoLabel").textContent =
        "Cadastrar Congregação";

    new bootstrap.Modal(
        document.getElementById("modalCongregacao")
    ).show();
}

/* ================= EDITAR ================= */
async function editarCongregacao(id) {
    const res = await fetch(API_CONGREGACOES + id);
    const item = await res.json();

    document.getElementById("congregacaoId").value = id;
    document.getElementById("congregacaoNome").value = item.nome;
    document.getElementById("modalCongregacaoLabel").textContent =
        "Editar Congregação";

    new bootstrap.Modal(
        document.getElementById("modalCongregacao")
    ).show();
}

/* ================= SALVAR ================= */
document.getElementById("formCongregacao").onsubmit = async (e) => {
    e.preventDefault();

    const id = document.getElementById("congregacaoId").value;
    const metodo = id ? "PUT" : "POST";
    const url = id ? API_CONGREGACOES + id : API_CONGREGACOES;

    await fetch(url, {
        method: metodo,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            nome: document.getElementById("congregacaoNome").value.trim()
        })
    });

    bootstrap.Modal.getInstance(
        document.getElementById("modalCongregacao")
    ).hide();

    listarCongregacoes();
};

/* ================= EXCLUIR ================= */
async function excluirCongregacao(id) {
    if (!confirm("Deseja excluir?")) return;
    await fetch(API_CONGREGACOES + id, { method: "DELETE" });
    listarCongregacoes();
}

document.addEventListener("DOMContentLoaded", listarCongregacoes);
</script>

</body>
</html>
