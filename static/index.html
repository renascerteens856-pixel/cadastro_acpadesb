<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <title>Adolescentes - Lista</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
        body {
            background: #f4f4f4;
        }

        .card {
            margin-top: 40px;
        }

        #logoTopo {
            display: block;
            margin: 20px auto;
            max-width: 250px;
            height: auto;
        }
    </style>
</head>

<body>
    <img id="logoTopo" src="static/Images/logo_adolescentes.PNG" alt="Logo Adolescentes" />

    <div class="container">
        <div class="card shadow">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h4 class="mb-0">Lista de Adolescentes</h4>
                <button class="btn btn-success" id="btnNovo" data-bs-toggle="modal" data-bs-target="#modalCadastro">Novo Adolescente</button>
            </div>

            <div class="card-body">
                <table class="table table-bordered table-striped text-center align-middle" id="tabela">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Pai</th>
                            <th>Mãe</th>
                            <th>Contato</th>
                            <th>Data Nasc.</th>
                            <th>Endereço (Rua, Nº, Bairro)</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista-adolescentes">
                        <!-- Conteúdo carregado pela API -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Cadastro / Edição -->
    <div class="modal fade" id="modalCadastro" tabindex="-1" aria-labelledby="modalCadastroLabel" aria-hidden="true">
        <div class="modal-dialog">
            <form id="formCadastro" class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalCadastroLabel">Cadastrar Adolescente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>

                <div class="modal-body">
                    <input type="hidden" id="editandoId" />

                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome *</label>
                        <input type="text" id="nome" class="form-control" required />
                    </div>

                    <div class="mb-3">
                        <label for="nome_pai" class="form-label">Nome do Pai</label>
                        <input type="text" id="nome_pai" class="form-control" />
                    </div>

                    <div class="mb-3">
                        <label for="nome_mae" class="form-label">Nome da Mãe</label>
                        <input type="text" id="nome_mae" class="form-control" />
                    </div>

                    <div class="mb-3">
                        <label for="contato" class="form-label">Contato</label>
                        <input type="text" id="contato" class="form-control" />
                    </div>

                    <div class="mb-3">
                        <label for="data_nasc" class="form-label">Data de Nascimento</label>
                        <input type="date" id="data_nasc" class="form-control" />
                    </div>

                    <h6>Endereço</h6>

                    <div class="mb-3">
                        <label for="rua" class="form-label">Rua</label>
                        <input type="text" id="rua" class="form-control" />
                    </div>

                    <div class="mb-3">
                        <label for="numero" class="form-label">Número</label>
                        <input type="text" id="numero" class="form-control" />
                    </div>

                    <div class="mb-3">
                        <label for="bairro" class="form-label">Bairro</label>
                        <input type="text" id="bairro" class="form-control" />
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Salvar</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const API_URL = "https://cadastro-adolescentes.onrender.com/adolescentes/";

        function formatarDataBR(dataIso) {
            if (!dataIso) return "";
            const data = new Date(dataIso + "T00:00:00Z");
            return `${String(data.getUTCDate()).padStart(2, "0")}/${String(data.getUTCMonth() + 1).padStart(2, "0")}/${data.getUTCFullYear()}`;
        }

        async function listarAdolescentes() {
            try {
                const res = await fetch(API_URL);
                const dados = await res.json();

                const tbody = document.getElementById("lista-adolescentes");
                tbody.innerHTML = "";

                dados.forEach((item) => {
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td>${item.id}</td>
                        <td>${item.nome}</td>
                        <td>${item.nome_pai || "-"}</td>
                        <td>${item.nome_mae || "-"}</td>
                        <td>${item.contato || "-"}</td>
                        <td>${formatarDataBR(item.data_nasc)}</td>
                        <td>${item.endereco?.rua || "-"}, ${item.endereco?.numero || "-"}, ${item.endereco?.bairro || "-"}</td>
                        <td>
                            <button class="btn btn-sm btn-primary btn-editar" data-id="${item.id}">Editar</button>
                            <button class="btn btn-sm btn-danger btn-excluir" data-id="${item.id}">Excluir</button>
                            <button class="btn btn-sm btn-secondary btn-imprimir" data-id="${item.id}">Imprimir</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                document.querySelectorAll(".btn-editar").forEach(btn => btn.onclick = () => carregarParaEditar(btn.dataset.id));
                document.querySelectorAll(".btn-excluir").forEach(btn => btn.onclick = () => excluirAdolescente(btn.dataset.id));
                document.querySelectorAll(".btn-imprimir").forEach(btn => btn.onclick = () => imprimirAdolescente(btn.dataset.id));

            } catch (error) {
                alert(error.message);
            }
        }

        async function carregarParaEditar(id) {
            const res = await fetch(API_URL + id);
            const item = await res.json();

            document.getElementById("editandoId").value = item.id;
            document.getElementById("nome").value = item.nome;
            document.getElementById("nome_pai").value = item.nome_pai || "";
            document.getElementById("nome_mae").value = item.nome_mae || "";
            document.getElementById("contato").value = item.contato || "";
            document.getElementById("data_nasc").value = item.data_nasc || "";
            document.getElementById("rua").value = item.endereco?.rua || "";
            document.getElementById("numero").value = item.endereco?.numero || "";
            document.getElementById("bairro").value = item.endereco?.bairro || "";

            new bootstrap.Modal(document.getElementById("modalCadastro")).show();
        }

        document.getElementById("btnNovo").onclick = () => {
            document.getElementById("formCadastro").reset();
            document.getElementById("editandoId").value = "";
            document.getElementById("modalCadastroLabel").textContent = "Cadastrar Adolescente";
        };

        document.getElementById("formCadastro").onsubmit = async function (e) {
            e.preventDefault();

            const id = document.getElementById("editandoId").value;
            const metodo = id ? "PUT" : "POST";
            const url = id ? API_URL + id : API_URL;

            const data = {
                nome: nome.value.trim(),
                nome_pai: nome_pai.value.trim(),
                nome_mae: nome_mae.value.trim(),
                contato: contato.value.trim(),
                data_nasc: data_nasc.value || null,
                endereco: {
                    rua: rua.value.trim(),
                    numero: numero.value.trim(),
                    bairro: bairro.value.trim(),
                },
            };

            await fetch(url, {
                method: metodo,
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data),
            });

            bootstrap.Modal.getInstance(document.getElementById("modalCadastro")).hide();
            listarAdolescentes();
        };

        async function excluirAdolescente(id) {
            if (!confirm("Confirma exclusão?")) return;
            await fetch(API_URL + id, { method: "DELETE" });
            listarAdolescentes();
        }

        async function imprimirAdolescente(id) {
            const res = await fetch(API_URL + id);
            const item = await res.json();

            const conteudo = `
                <div style="text-align:center; margin-bottom:20px;">
                    <img src="static/Images/logo_adolescentes.PNG" style="max-width:150px;" />
                </div>

                <h2 style="text-align:center; margin-bottom:20px;">Ficha do Adolescente</h2>

                <table border="1" cellspacing="0" cellpadding="8" style="width:100%; border-collapse: collapse;">
                    <tr><th align="left">Nome</th><td>${item.nome}</td></tr>
                    <tr><th align="left">Nome do Pai</th><td>${item.nome_pai || "-"}</td></tr>
                    <tr><th align="left">Nome da Mãe</th><td>${item.nome_mae || "-"}</td></tr>
                    <tr><th align="left">Contato</th><td>${item.contato || "-"}</td></tr>
                    <tr><th align="left">Data de Nascimento</th><td>${formatarDataBR(item.data_nasc)}</td></tr>
                    <tr><th align="left">Endereço</th><td>${item.endereco?.rua || "-"}, ${item.endereco?.numero || "-"}, ${item.endereco?.bairro || "-"}</td></tr>
                </table>
            `;

            const w = window.open("", "", "width=600,height=700");
            w.document.write(`
                <html><head><title>Ficha</title></head>
                <body>${conteudo}</body></html>
            `);
            w.document.close();
            w.print();
        }

        document.addEventListener("DOMContentLoaded", listarAdolescentes);
    </script>
</body>

</html>
