<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cadastro de Adolescentes</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    body { background: #f5f5f5; }
    .container-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<div class="container mt-4">

  <h2 class="text-center mb-4">Cadastro de Adolescentes</h2>

  <!-- BUSCA -->
  <div class="container-box">
    <div class="row g-2">
      <div class="col-md-8">
        <input id="busca_nome" class="form-control" placeholder="Buscar por nome...">
      </div>
      <div class="col-md-2">
        <button onclick="buscar()" class="btn btn-primary w-100">Pesquisar</button>
      </div>
      <div class="col-md-2">
        <button onclick="listarTodos()" class="btn btn-secondary w-100">Listar Todos</button>
      </div>
    </div>
  </div>

  <!-- LISTA -->
  <div id="lista" class="container-box mt-3"></div>
</div>

<!-- MODAL EDIÇÃO -->
<div class="modal fade" id="modalEditar" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Editar Adolescente</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input type="hidden" id="edit_id">

        <div class="row g-3">

          <div class="col-md-8">
            <label>Nome completo</label>
            <input id="edit_nome" class="form-control">
          </div>

          <div class="col-md-4">
            <label>Contato</label>
            <input id="edit_contato" class="form-control">
          </div>

          <div class="col-md-6">
            <label>Nome do Pai</label>
            <input id="edit_nome_pai" class="form-control">
          </div>

          <div class="col-md-6">
            <label>Nome da Mãe</label>
            <input id="edit_nome_mae" class="form-control">
          </div>

          <div class="col-md-4">
            <label>Data de Nascimento</label>
            <input id="edit_data_nasc" type="date" class="form-control">
          </div>

          <h5 class="mt-3">Endereço</h5>

          <div class="col-md-6">
            <label>Rua</label>
            <input id="edit_rua" class="form-control">
          </div>

          <div class="col-md-3">
            <label>Número</label>
            <input id="edit_numero" class="form-control">
          </div>

          <div class="col-md-3">
            <label>Bairro</label>
            <input id="edit_bairro" class="form-control">
          </div>

        </div>
      </div>

      <div class="modal-footer">
        <button onclick="salvarEdicao()" class="btn btn-primary">Salvar Alterações</button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

const API_BASE = "https://cadastro-adolescentes.onrender.com";

/* ===============================
    BUSCAR TODOS
=============================== */
async function listarTodos() {
  const res = await fetch(`${API_BASE}/adolescentes?select=*`);
  const dados = await res.json();
  mostrarLista(dados);
}

/* ===============================
    BUSCAR POR NOME
=============================== */
async function buscar() {
  const nome = busca_nome.value.trim();

  if (!nome) return listarTodos();

  const res = await fetch(
    `${API_BASE}/adolescentes?nome=ilike.*${nome}*&select=*`
  );

  const dados = await res.json();
  mostrarLista(dados);
}

/* ===============================
    CARREGAR MODAL DE EDIÇÃO
=============================== */
function editar(id) {
  fetch(`${API_BASE}/adolescentes?id=eq.${id}&select=*`)
    .then(r => r.json())
    .then(dados => {
      const d = dados[0];

      edit_id.value = d.id;
      edit_nome.value = d.nome;
      edit_contato.value = d.contato;
      edit_nome_pai.value = d.nome_pai;
      edit_nome_mae.value = d.nome_mae;
      edit_data_nasc.value = d.data_nasc;

      // Endereço OBJETO
      edit_rua.value = d.endereco?.rua || "";
      edit_numero.value = d.endereco?.numero || "";
      edit_bairro.value = d.endereco?.bairro || "";

      new bootstrap.Modal(modalEditar).show();
    });
}

/* ===============================
    SALVAR EDIÇÃO
=============================== */
async function salvarEdicao() {

  const id = edit_id.value;

  const payload = {
    nome: edit_nome.value,
    contato: edit_contato.value,
    nome_pai: edit_nome_pai.value,
    nome_mae: edit_nome_mae.value,
    data_nasc: edit_data_nasc.value,

    // Endereço é um objeto
    endereco: {
      rua: edit_rua.value,
      numero: edit_numero.value,
      bairro: edit_bairro.value
    }
  };

  await fetch(`${API_BASE}/adolescentes?id=eq.${id}`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  listarTodos();
}

/* ===============================
    LISTAGEM
=============================== */
function mostrarLista(lista) {

  let html = `
    <table class="table table-striped">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Contato</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
  `;

  lista.forEach(d => {
    html += `
      <tr>
        <td>${d.nome}</td>
        <td>${d.contato}</td>
        <td>
          <button class="btn btn-warning btn-sm" onclick="editar(${d.id})">Editar</button>
        </td>
      </tr>
    `;
  });

  html += `</tbody></table>`;

  listaDiv.innerHTML = html;
}

document.addEventListener("DOMContentLoaded", listarTodos);

</script>

</body>
</html>
