<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ACPADESB</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f4f4f4; }
#logoTopo { display:block; margin:20px auto; max-width:220px; }
.card { margin-top:20px; }
th, td { text-align:center; vertical-align:middle; font-size:14px; }
</style>
</head>

<body>

<img id="logoTopo" src="/static/Images/ACP_Escuro.png">

<div class="container">

<ul class="nav nav-tabs">
  <li class="nav-item">
    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabAdolescentes">Adolescentes</button>
  </li>
  <li class="nav-item">
    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabCriancas">Crianças</button>
  </li>
  <li class="nav-item">
    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabCongregacoes">Congregações</button>
  </li>
</ul>

<div class="tab-content">

<!-- ================= ADOLESCENTES ================= -->
<div class="tab-pane fade show active" id="tabAdolescentes">
<div class="card shadow">
<div class="card-header d-flex justify-content-between align-items-center">
  <h5>Adolescentes</h5>
  <div>
    <input class="form-control d-inline-block me-2" style="width:220px"
      placeholder="Buscar por nome"
      onkeyup="buscarAdolescentesPorNome(this.value)">
    <button class="btn btn-success" onclick="novoAdolescente()">Novo</button>
  </div>
</div>

<div class="card-body table-responsive">
<table class="table table-bordered table-striped">
<thead class="table-dark">
<tr>
  <th>Nome</th>
  <th>Pai</th>
  <th>Mãe</th>
  <th>Contato</th>
  <th>Congregação</th>
  <th>Ações</th>
</tr>
</thead>
<tbody id="listaAdolescentes"></tbody>
</table>
</div>
</div>
</div>

<!-- ================= CRIANÇAS ================= -->
<div class="tab-pane fade" id="tabCriancas">
<div class="card shadow">
<div class="card-header d-flex justify-content-between">
  <h5>Crianças</h5>
  <button class="btn btn-success" onclick="novaCrianca()">Novo</button>
</div>

<div class="card-body table-responsive">
<table class="table table-bordered table-striped">
<thead class="table-dark">
<tr>
  <th>Nome</th>
  <th>Pai</th>
  <th>Mãe</th>
  <th>Congregação</th>
  <th>Ações</th>
</tr>
</thead>
<tbody id="listaCriancas"></tbody>
</table>
</div>
</div>
</div>

<!-- ================= CONGREGAÇÕES ================= -->
<div class="tab-pane fade" id="tabCongregacoes">
<div class="card shadow">
<div class="card-header d-flex justify-content-between">
  <h5>Congregações</h5>
  <button class="btn btn-success" onclick="novaCongregacao()">Nova</button>
</div>

<div class="card-body">
<table class="table table-bordered table-striped">
<thead class="table-dark">
<tr>
  <th>Nome</th>
  <th>Ações</th>
</tr>
</thead>
<tbody id="listaCongregacoes"></tbody>
</table>
</div>
</div>
</div>

</div>
</div>

<!-- ================= MODAL PESSOA ================= -->
<div class="modal fade" id="modalPessoa">
<div class="modal-dialog modal-lg">
<form class="modal-content" onsubmit="salvarPessoa(event)">
<div class="modal-header">
  <h5 id="tituloPessoa"></h5>
  <button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body row g-2">
<input type="hidden" id="pessoaId">
<input type="hidden" id="tipoPessoa">

<div class="col-md-6"><input class="form-control" id="nome" placeholder="Nome" required></div>
<div class="col-md-6"><input class="form-control" id="contato" placeholder="Contato"></div>

<div class="col-md-6"><input class="form-control" id="nome_pai" placeholder="Pai"></div>
<div class="col-md-6"><input class="form-control" id="nome_mae" placeholder="Mãe"></div>

<div class="col-md-12">
<select class="form-select" id="congregacao"></select>
</div>

<div class="col-md-4"><input class="form-control" id="rua" placeholder="Rua"></div>
<div class="col-md-4"><input class="form-control" id="numero" placeholder="Número"></div>
<div class="col-md-4"><input class="form-control" id="bairro" placeholder="Bairro"></div>
</div>

<div class="modal-footer">
<button class="btn btn-primary">Salvar</button>
</div>
</form>
</div>
</div>

<!-- ================= MODAL CONGREGAÇÃO ================= -->
<div class="modal fade" id="modalCongregacao">
<div class="modal-dialog">
<form class="modal-content" onsubmit="salvarCongregacao(event)">
<div class="modal-header">
  <h5 id="tituloCongregacao"></h5>
  <button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
<input type="hidden" id="congregacaoId">
<input class="form-control" id="congregacaoNome" placeholder="Nome" required>
</div>

<div class="modal-footer">
<button class="btn btn-primary">Salvar</button>
</div>
</form>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API="http://127.0.0.1:5000";

const modalPessoa = new bootstrap.Modal(document.getElementById("modalPessoa"));
const modalCong   = new bootstrap.Modal(document.getElementById("modalCongregacao"));

let congregacoes={}, cacheAdolescentes=[], cacheCriancas=[];

/* ================= CONGREGAÇÕES ================= */
async function carregarCongregacoes(){
  const r=await fetch(API+"/congregacoes/");
  const dados=await r.json();
  congregacoes={};
  congregacao.innerHTML="";
  listaCongregacoes.innerHTML="";
  dados.forEach(c=>{
    congregacoes[c.id]=c.nome;
    congregacao.innerHTML+=`<option value="${c.id}">${c.nome}</option>`;
    listaCongregacoes.innerHTML+=`
      <tr>
        <td>${c.nome}</td>
        <td>
          <button class="btn btn-sm btn-primary" onclick="editarCongregacao(${c.id},'${c.nome}')">Editar</button>
          <button class="btn btn-sm btn-danger" onclick="excluirCongregacao(${c.id})">Excluir</button>
        </td>
      </tr>`;
  });
}

function novaCongregacao(){
  congregacaoId.value="";
  congregacaoNome.value="";
  tituloCongregacao.innerText="Nova Congregação";
  modalCong.show();
}

function editarCongregacao(id,nome){
  congregacaoId.value=id;
  congregacaoNome.value=nome;
  tituloCongregacao.innerText="Editar Congregação";
  modalCong.show();
}

async function salvarCongregacao(e){
  e.preventDefault();
  const id=congregacaoId.value;
  await fetch(API+"/congregacoes/"+(id||""),{
    method:id?"PUT":"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({nome:congregacaoNome.value})
  });
  modalCong.hide();
  carregarCongregacoes();
}

async function excluirCongregacao(id){
  if(confirm("Excluir congregação?")){
    await fetch(API+"/congregacoes/"+id,{method:"DELETE"});
    carregarCongregacoes();
  }
}

/* ================= PESSOAS ================= */
function novoAdolescente(){ abrirPessoa("adolescentes"); }
function novaCrianca(){ abrirPessoa("criancas"); }

function abrirPessoa(tipo){
  document.querySelector("#modalPessoa form").reset();
  pessoaId.value="";
  tipoPessoa.value=tipo;
  tituloPessoa.innerText="Novo "+(tipo==="criancas"?"Criança":"Adolescente");
  modalPessoa.show();
}

function editarPessoa(id,tipo){
  const lista=tipo==="criancas"?cacheCriancas:cacheAdolescentes;
  const p=lista.find(x=>x.id===id);
  if(!p) return;
  pessoaId.value=p.id;
  tipoPessoa.value=tipo;
  nome.value=p.nome||"";
  nome_pai.value=p.nome_pai||"";
  nome_mae.value=p.nome_mae||"";
  contato.value=p.contato||"";
  congregacao.value=p.congregacao||"";
  rua.value=p.endereco?.rua||"";
  numero.value=p.endereco?.numero||"";
  bairro.value=p.endereco?.bairro||"";
  tituloPessoa.innerText="Editar";
  modalPessoa.show();
}

async function salvarPessoa(e){
  e.preventDefault();
  const tipo=tipoPessoa.value;
  const id=pessoaId.value;

  const payload={ nome:nome.value };

  if(nome_pai.value) payload.nome_pai=nome_pai.value;
  if(nome_mae.value) payload.nome_mae=nome_mae.value;
  if(contato.value) payload.contato=contato.value;
  if(congregacao.value) payload.congregacao=Number(congregacao.value);

  if(rua.value||numero.value||bairro.value){
    payload.endereco={
      rua:rua.value||null,
      numero:numero.value||null,
      bairro:bairro.value||null
    };
  }

  await fetch(API+"/"+tipo+"/"+(id||""),{
    method:id?"PUT":"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload)
  });

  modalPessoa.hide();
  listarAdolescentes();
  listarCriancas();
}

async function excluirPessoa(id,tipo){
  if(confirm("Excluir registro?")){
    await fetch(API+"/"+tipo+"/"+id,{method:"DELETE"});
    listarAdolescentes();
    listarCriancas();
  }
}

/* ================= LISTAS ================= */
function renderAdolescentes(lista){
  listaAdolescentes.innerHTML="";
  lista.forEach(a=>{
    listaAdolescentes.innerHTML+=`
      <tr>
        <td>${a.nome}</td>
        <td>${a.nome_pai||"-"}</td>
        <td>${a.nome_mae||"-"}</td>
        <td>${a.contato||"-"}</td>
        <td>${congregacoes[a.congregacao]||"-"}</td>
        <td>
          <button class="btn btn-sm btn-primary" onclick="editarPessoa(${a.id},'adolescentes')">Editar</button>
          <button class="btn btn-sm btn-danger" onclick="excluirPessoa(${a.id},'adolescentes')">Excluir</button>
          <button class="btn btn-sm btn-secondary" onclick="imprimirPessoa(${a.id},'adolescentes')">Imprimir</button>
        </td>
      </tr>`;
  });
}

function renderCriancas(lista){
  listaCriancas.innerHTML="";
  lista.forEach(c=>{
    listaCriancas.innerHTML+=`
      <tr>
        <td>${c.nome}</td>
        <td>${c.nome_pai||"-"}</td>
        <td>${c.nome_mae||"-"}</td>
        <td>${congregacoes[c.congregacao]||"-"}</td>
        <td>
          <button class="btn btn-sm btn-primary" onclick="editarPessoa(${c.id},'criancas')">Editar</button>
          <button class="btn btn-sm btn-danger" onclick="excluirPessoa(${c.id},'criancas')">Excluir</button>
          <button class="btn btn-sm btn-secondary" onclick="imprimirPessoa(${c.id},'criancas')">Imprimir</button>
        </td>
      </tr>`;
  });
}

async function listarAdolescentes(){
  const r=await fetch(API+"/adolescentes/");
  cacheAdolescentes=await r.json();
  renderAdolescentes(cacheAdolescentes);
}

async function listarCriancas(){
  const r=await fetch(API+"/criancas/");
  cacheCriancas=await r.json();
  renderCriancas(cacheCriancas);
}

/* ================= BUSCA ================= */
async function buscarAdolescentesPorNome(nome){
  if(!nome){
    renderAdolescentes(cacheAdolescentes);
    return;
  }
  const r=await fetch(API+"/adolescentes/buscar?nome="+encodeURIComponent(nome));
  const dados=await r.json();
  renderAdolescentes(dados);
}

/* ================= IMPRESSÃO ================= */
function imprimirPessoa(id,tipo){
  const lista=tipo==="criancas"?cacheCriancas:cacheAdolescentes;
  const p=lista.find(x=>x.id===id);
  if(!p) return;

  const e=p.endereco||{};
  const cong=congregacoes[p.congregacao]||"-";

  const w=window.open("","_blank");
  w.document.write(`
    <html><head><title>Impressão</title>
    <style>
      body{font-family:Arial;padding:40px;}
      img{display:block;margin:0 auto 20px;max-width:200px;}
      table{width:100%;border-collapse:collapse;}
      td{border:1px solid #333;padding:8px;}
      h2{text-align:center;}
    </style></head>
    <body>
      <img src="/static/Images/ACP_Escuro.png">
      <h2>${tipo==="criancas"?"Cadastro de Criança":"Cadastro de Adolescente"}</h2>
      <table>
        <tr><td>Nome</td><td>${p.nome}</td></tr>
        <tr><td>Pai</td><td>${p.nome_pai||"-"}</td></tr>
        <tr><td>Mãe</td><td>${p.nome_mae||"-"}</td></tr>
        <tr><td>Contato</td><td>${p.contato||"-"}</td></tr>
        <tr><td>Congregação</td><td>${cong}</td></tr>
        <tr><td>Endereço</td><td>${e.rua||""} ${e.numero||""} ${e.bairro||""}</td></tr>
      </table>
      <script>window.print();<\/script>
    </body></html>
  `);
  w.document.close();
}

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded",async()=>{
  await carregarCongregacoes();
  listarAdolescentes();
  listarCriancas();
});
</script>

</body>
</html>
