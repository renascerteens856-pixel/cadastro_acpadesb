<script>
// ===============================
// BUSCAR POR NOME
// ===============================
async function buscarPorNome() {
    const nome = document.getElementById("buscarNome").value;

    const url = nome.trim()
        ? `https://cadastro-adolescentes.onrender.com/adolescentes?nome=${encodeURIComponent(nome)}`
        : `https://cadastro-adolescentes.onrender.com/adolescentes`;

    const resposta = await fetch(url);
    const dados = await resposta.json();

    mostrarLista(dados);
}

// ===============================
// MOSTRAR LISTA DE ADOLESCENTES
// ===============================
function mostrarLista(lista) {
    const tbody = document.getElementById("listaAdolescentes");
    tbody.innerHTML = "";

    lista.forEach(a => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${a.id}</td>
            <td>${a.nome}</td>
            <td>${a.idade}</td>
            <td>${a.contato}</td>
            <td>${a.endereco?.rua || ""}, ${a.endereco?.numero || ""}, ${a.endereco?.bairro || ""}</td>
            <td>
                <button onclick="carregarParaEdicao(${a.id})">Editar</button>
            </td>
        `;

        tbody.appendChild(tr);
    });
}

// ===============================
// BUSCAR POR ID E PREPARAR FORMULÁRIO DE EDIÇÃO
// ===============================
async function carregarParaEdicao(id) {
    const resposta = await fetch(`https://cadastro-adolescentes.onrender.com/adolescentes/${id}`);
    const dados = await resposta.json();

    document.getElementById("idEdicao").value = dados.id;
    document.getElementById("nomeEdicao").value = dados.nome;
    document.getElementById("idadeEdicao").value = dados.idade;
    document.getElementById("contatoEdicao").value = dados.contato;

    document.getElementById("ruaEdicao").value = dados.endereco?.rua || "";
    document.getElementById("numeroEdicao").value = dados.endereco?.numero || "";
    document.getElementById("bairroEdicao").value = dados.endereco?.bairro || "";

    document.getElementById("formEdicao").style.display = "block";
}

// ===============================
// SALVAR ALTERAÇÕES (PUT)
// ===============================
async function salvarAlteracoes() {
    const id = document.getElementById("idEdicao").value;

    const corpo = {
        nome: document.getElementById("nomeEdicao").value,
        idade: parseInt(document.getElementById("idadeEdicao").value),
        contato: document.getElementById("contatoEdicao").value,
        endereco: {
            rua: document.getElementById("ruaEdicao").value,
            numero: document.getElementById("numeroEdicao").value,
            bairro: document.getElementById("bairroEdicao").value
        }
    };

    const resposta = await fetch(`https://cadastro-adolescentes.onrender.com/adolescentes/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(corpo)
    });

    const dados = await resposta.json();
    console.log("Resposta do PUT:", dados);

    if (resposta.ok) {
        alert("Atualizado com sucesso!");
        buscarPorNome();
        document.getElementById("formEdicao").style.display = "none";
    } else {
        alert("Erro ao atualizar: " + JSON.stringify(dados));
    }
}
</script>
