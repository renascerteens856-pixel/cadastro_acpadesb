<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cadastro de Adolescentes</title>

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body { background: #f5f5f5; }
    .container-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    #mensagem { display: none; }
    .logo-img { width: 150px; display:block; margin:10px auto; }
  </style>
</head>
<body>

<div class="container mt-4">
  <img src="{{ url_for('static', filename='Images/logo_adolescentes.PNG') }}" class="logo-img" alt="logo">
  <h2 class="text-center mb-3">Cadastro de Adolescentes</h2>

  <!-- FORMULÁRIO -->
  <div class="container-box">
    <div class="row g-3">
      <div class="col-md-8">
        <label class="form-label">Nome completo</label>
        <input id="nome" class="form-control" />
      </div>

      <div class="col-md-4">
        <label class="form-label">Contato</label>
        <input id="contato" class="form-control" maxlength="15" placeholder="(99) 99999-9999" />
      </div>

      <div class="col-md-6">
        <label class="form-label">Nome do Pai</label>
        <input id="nome_pai" class="form-control" />
      </div>

      <div class="col-md-6">
        <label class="form-label">Nome da Mãe</label>
        <input id="nome_mae" class="form-control" />
      </div>

      <div class="col-md-4">
        <label class="form-label">Data de Nascimento</label>
        <input id="data_nasc" type="date" class="form-control" />
      </div>

      <h5 class="mt-3">Endereço</h5>

      <div class="col-md-6">
        <label class="form-label">Rua</label>
        <input id="rua" class="form-control" />
      </div>

      <div class="col-md-3">
        <label class="form-label">Número</label>
        <input id="numero" class="form-control" />
      </div>

      <div class="col-md-3">
        <label class="form-label">Bairro</label>
        <input id="bairro" class="form-control" />
      </div>

      <div class="col-12 mt-3">
        <button id="btn-salvar" class="btn btn-primary w-100">Salvar</button>
      </div>
    </div>
  </div>

  <!-- BUSCA -->
  <div class="container-box mt-3">
    <div class="row g-2">
      <div class="col-md-8">
        <input id="busca_nome" class="form-control" placeholder="Buscar por nome..." />
      </div>
      <div class="col-md-2">
        <button id="btn-buscar" class="btn btn-outline-primary w-100">Pesquisar</button>
      </div>
      <div class="col-md-2">
        <button id="btn-listar" class="btn btn-secondary w-100">Listar Todos</button>
      </div>
    </div>
  </div>

  <!-- MENSAGENS -->
  <div id="mensagem" class="alert alert-danger mt-3" role="alert"></div>
  <div id="sucesso" class="alert alert-success mt-3" style="display:none;" role="alert"></div>

  <!-- LISTA -->
  <div id="lista" class="container-box mt-3"></div>
</div>

<!-- MODAL EDITAR -->
<div class="modal fade" id="modalEditar" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Editar Adolescente</h5>
        <button class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>

      <div class="modal-body">
        <input type="hidden" id="edit_id">

        <div class="row g-3">
          <div class="col-md-8">
            <label class="form-label">Nome completo</label>
            <input id="edit_nome" class="form-control" />
          </div>

          <div class="col-md-4">
            <label class="form-label">Contato</label>
            <input id="edit_contato" class="form-control" maxlength="15" />
          </div>

          <div class="col-md-6">
            <label class="form-label">Nome do Pai</label>
            <input id="edit_nome_pai" class="form-control" />
          </div>

          <div class="col-md-6">
            <label class="form-label">Nome da Mãe</label>
            <input id="edit_nome_mae" class="form-control" />
          </div>

          <div class="col-md-4">
            <label class="form-label">Data de Nascimento</label>
            <input id="edit_data_nasc" type="date" class="form-control" />
          </div>

          <h5>Endereço</h5>

          <div class="col-md-6">
            <label class="form-label">Rua</label>
            <input id="edit_rua" class="form-control" />
          </div>

          <div class="col-md-3">
            <label class="form-label">Número</label>
            <input id="edit_numero" class="form-control" />
          </div>

          <div class="col-md-3">
            <label class="form-label">Bairro</label>
            <input id="edit_bairro" class="form-control" />
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button id="btn-salvar-edit" class="btn btn-primary">Salvar Alterações</button>
      </div>
    </div>
  </div>
</div>

<!-- BOOTSTRAP JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ============================
   CONFIG
   ============================ */
// Usa URL relativa para funcionar em qualquer ambiente
const API_BASE = "";

// shortcuts to DOM elements
const el = id => document.getElementById(id);
const listaEl = el('lista');
const msgEl = el('mensagem');
const successEl = el('sucesso');

function showError(msg, consoleObj) {
  msgEl.style.display = 'block';
  msgEl.textContent = msg;
  successEl.style.display = 'none';
  console.error('Erro:', msg, consoleObj || '');
}

function showSuccess(msg) {
  successEl.style.display = 'block';
  successEl.textContent = msg;
  msgEl.style.display = 'none';
}

function hideMessages() {
  msgEl.style.display = 'none';
  successEl.style.display = 'none';
}

// máscara para contato
function mascaraContato(v) {
  v = v.replace(/\D/g, "");
  if (v.length === 0) return "";
  v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
  v = v.replace(/(\d{5})(\d)/, "$1-$2");
  return v;
}

/* ============================
   Eventos iniciais
   ============================ */
document.addEventListener('DOMContentLoaded', function() {
  el('btn-salvar').addEventListener('click', salvarAdolescente);
  el('btn-buscar').addEventListener('click', buscar);
  el('btn-listar').addEventListener('click', listarTodos);
  el('contato').addEventListener('input', e => e.target.value = mascaraContato(e.target.value));
  el('edit_contato').addEventListener('input', e => e.target.value = mascaraContato(e.target.value));
  el('btn-salvar-edit').addEventListener('click', salvarEdicao);
  
  // Carrega a lista inicial
  listarTodos();
});

/* ============================
   FUNÇÕES AJAX
   ============================ */

async function safeFetch(url, options = {}) {
  try {
    const res = await fetch(url, options);
    if (!res.ok) {
      let errorText = await res.text().catch(() => 'Erro desconhecido');
      throw new Error(`HTTP ${res.status}: ${errorText}`);
    }
    return await res.json();
  } catch (err) {
    throw err;
  }
}

async function listarTodos() {
  hideMessages();
  try {
    const dados = await safeFetch(`${API_BASE}/adolescentes`);
    renderLista(dados);
  } catch (err) {
    showError('Erro ao carregar dados: ' + err.message);
  }
}

async function buscar() {
  hideMessages();
  const nome = el('busca_nome').value.trim();
  if (!nome) return listarTodos();
  try {
    const dados = await safeFetch(`${API_BASE}/adolescentes?nome=${encodeURIComponent(nome)}`);
    renderLista(dados);
  } catch (err) {
    showError('Erro ao buscar: ' + err.message);
  }
}

async function salvarAdolescente() {
  hideMessages();
  
  const payload = {
    nome: el('nome').value.trim(),
    contato: el('contato').value.replace(/\D/g,''),
    nome_pai: el('nome_pai').value.trim(),
    nome_mae: el('nome_mae').value.trim(),
    data_nasc: el('data_nasc').value,
    rua: el('rua').value.trim(),
    numero: el('numero').value.trim(),
    bairro: el('bairro').value.trim()
  };

  // Validação básica
  if (!payload.nome) {
    showError('Nome é obrigatório');
    return;
  }

  try {
    const response = await safeFetch(`${API_BASE}/adolescentes`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    showSuccess('Adolescente cadastrado com sucesso!');
    listarTodos();
    
    // Limpa formulário
    el('nome').value = '';
    el('contato').value = '';
    el('nome_pai').value = '';
    el('nome_mae').value = '';
    el('data_nasc').value = '';
    el('rua').value = '';
    el('numero').value = '';
    el('bairro').value = '';
    
  } catch (err) {
    showError('Erro ao salvar: ' + err.message);
  }
}

async function editar(id) {
  hideMessages();
  try {
    const data = await safeFetch(`${API_BASE}/adolescentes/${id}`);
    
    el('edit_id').value = data.id;
    el('edit_nome').value = data.nome || '';
    el('edit_contato').value = data.contato ? mascaraContato(String(data.contato)) : '';
    el('edit_nome_pai').value = data.nome_pai || '';
    el('edit_nome_mae').value = data.nome_mae || '';
    el('edit_data_nasc').value = data.data_nasc || '';
    el('edit_rua').value = data.rua || '';
    el('edit_numero').value = data.numero || '';
    el('edit_bairro').value = data.bairro || '';

    new bootstrap.Modal(el('modalEditar')).show();
  } catch (err) {
    showError('Erro ao carregar dados para edição: ' + err.message);
  }
}

async function salvarEdicao() {
  hideMessages();
  const id = el('edit_id').value;
  if (!id) {
    showError('ID não encontrado para edição');
    return;
  }

  const payload = {
    nome: el('edit_nome').value.trim(),
    contato: el('edit_contato').value.replace(/\D/g,''),
    nome_pai: el('edit_nome_pai').value.trim(),
    nome_mae: el('edit_nome_mae').value.trim(),
    data_nasc: el('edit_data_nasc').value,
    rua: el('edit_rua').value.trim(),
    numero: el('edit_numero').value.trim(),
    bairro: el('edit_bairro').value.trim()
  };

  if (!payload.nome) {
    showError('Nome é obrigatório');
    return;
  }

  try {
    await safeFetch(`${API_BASE}/adolescentes/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    showSuccess('Adolescente atualizado com sucesso!');
    bootstrap.Modal.getInstance(el('modalEditar')).hide();
    listarTodos();
  } catch (err) {
    showError('Erro ao salvar edição: ' + err.message);
  }
}

async function deletar(id) {
  if (!confirm('Tem certeza que deseja excluir este registro?')) return;
  hideMessages();
  try {
    await safeFetch(`${API_BASE}/adolescentes/${id}`, { 
      method: 'DELETE' 
    });
    showSuccess('Adolescente excluído com sucesso!');
    listarTodos();
  } catch (err) {
    showError('Erro ao excluir: ' + err.message);
  }
}

/* ============================
   RENDER LISTA
   ============================ */
function renderLista(data) {
  const arr = Array.isArray(data) ? data : (data ? [data] : []);
  
  if (!arr.length) {
    listaEl.innerHTML = `<p class="text-center mb-0 text-muted">Nenhum registro encontrado.</p>`;
    return;
  }

  let html = `
    <div class="table-responsive">
      <table class="table table-striped table-hover mb-0">
        <thead class="table-dark">
          <tr>
            <th>Nome</th>
            <th>Contato</th>
            <th>Data Nasc.</th>
            <th style="width:280px">Ações</th>
          </tr>
        </thead>
        <tbody>
  `;

  arr.forEach(d => {
    const contatoFmt = d.contato ? mascaraContato(String(d.contato)) : '-';
    const dataNasc = d.data_nasc ? new Date(d.data_nasc).toLocaleDateString('pt-BR') : '-';
    
    html += `
      <tr>
        <td>${escapeHtml(d.nome || '')}</td>
        <td>${escapeHtml(contatoFmt)}</td>
        <td>${escapeHtml(dataNasc)}</td>
        <td>
          <button class="btn btn-sm btn-warning me-1" onclick="editar(${d.id})">Editar</button>
          <button class="btn btn-sm btn-danger me-1" onclick="deletar(${d.id})">Excluir</button>
          <button class="btn btn-sm btn-info" onclick='imprimirRegistro(${JSON.stringify(d)})'>Imprimir</button>
        </td>
      </tr>
    `;
  });

  html += '</tbody></table></div>';
  listaEl.innerHTML = html;
}

function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

/* ============================
   IMPRESSÃO
   ============================ */
function imprimirRegistro(d) {
  const nome = escapeHtml(d.nome || '');
  const pai = escapeHtml(d.nome_pai || '-');
  const mae = escapeHtml(d.nome_mae || '-');
  const contato = escapeHtml(d.contato ? mascaraContato(String(d.contato)) : '-');
  const nasc = escapeHtml(d.data_nasc ? new Date(d.data_nasc).toLocaleDateString('pt-BR') : '-');
  const rua = escapeHtml(d.rua || '');
  const numero = escapeHtml(d.numero || '');
  const bairro = escapeHtml(d.bairro || '');

  const html = `
  <!doctype html>
  <html>
  <head>
    <meta charset="utf-8">
    <title>Ficha do Adolescente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; }
      .logo { width: 180px; margin: 20px auto; display: block; }
      @media print { body { margin: 0; } }
    </style>
  </head>
  <body>
    <img src="${window.location.origin}${API_BASE}/static/Images/logo_adolescentes.PNG" class="logo" alt="logo">
    <div class="container">
      <h3 class="text-center mb-4">Ficha do Adolescente</h3>
      <hr>
      <div class="row">
        <div class="col-md-6">
          <p><strong>Nome:</strong> ${nome}</p>
          <p><strong>Pai:</strong> ${pai}</p>
          <p><strong>Mãe:</strong> ${mae}</p>
        </div>
        <div class="col-md-6">
          <p><strong>Contato:</strong> ${contato}</p>
          <p><strong>Data de nascimento:</strong> ${nasc}</p>
          <p><strong>Endereço:</strong> ${rua}, ${numero} - ${bairro}</p>
        </div>
      </div>
    </div>
    <script>
      window.onload = function() {
        window.print();
        setTimeout(() => window.close(), 100);
      }
    </script>
  </body>
  </html>
  `;

  const w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
}
</script>
</body>
</html>
