<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ACPADESB</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

<style>
body { background:#f4f4f4; }
#logoTopo { display:block; margin:20px auto; max-width:220px; }
.card { margin-top:20px; }
th, td { text-align:center; vertical-align:middle; font-size:14px; }
.header-actions { display: flex; align-items: center; gap: 10px; }
.toast-notification {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 9999;
    min-width: 300px;
}
@media print {
    .no-print { display: none !important; }
}
</style>
</head>

<body>

<img id="logoTopo" src="/static/Images/ACP_Escuro.png" class="no-print">

<div class="container">

<div class="toast-notification no-print" id="notificationToast" style="display: none;">
    <div class="toast show" role="alert">
        <div class="toast-header" id="toastHeader">
            <strong class="me-auto" id="toastTitle">Notificação</strong>
            <button type="button" class="btn-close" onclick="fecharToast()"></button>
        </div>
        <div class="toast-body" id="toastMessage"></div>
    </div>
</div>

<ul class="nav nav-tabs no-print">
  <li class="nav-item">
    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabAdolescentes">Adolescentes</button>
  </li>
  <li class="nav-item">
    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabCriancas">Crianças</button>
  </li>
  <li class="nav-item">
    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabCongregacoes">Congregações</button>
  </li>
</ul>

<div class="tab-content">

<!-- ADOLESCENTES -->
<div class="tab-pane fade show active" id="tabAdolescentes">
<div class="card shadow">
<div class="card-header d-flex justify-content-between align-items-center no-print">
  <h5>Adolescentes</h5>
  <div class="header-actions">
    <input class="form-control" style="width:220px" placeholder="Buscar por nome" id="buscaAdolescentes" onkeyup="buscarAdolescentesPorNome(this.value)">
    <button class="btn btn-success" onclick="novoAdolescente()">Novo</button>
    <div class="btn-group">
      <button class="btn btn-info dropdown-toggle" data-bs-toggle="dropdown">Exportar</button>
      <ul class="dropdown-menu">
        <li><a class="dropdown-item" href="#" onclick="exportarParaExcel('adolescentes')">📊 Excel</a></li>
        <li><a class="dropdown-item" href="#" onclick="exportarParaCSV('adolescentes')">📄 CSV</a></li>
      </ul>
    </div>
  </div>
</div>
<div class="card-body table-responsive">
<table class="table table-bordered">
<thead class="table-dark"><tr><th>ID</th><th>Nome</th><th>Pai</th><th>Mãe</th><th>CPF</th><th>RG</th><th>Contato</th><th>Data Nasc.</th><th>Congregação</th><th>Endereço</th><th class="no-print">Ações</th></tr></thead>
<tbody id="listaAdolescentes"></tbody>
</table>
</div>
</div>
</div>

<!-- CRIANÇAS -->
<div class="tab-pane fade" id="tabCriancas">
<div class="card shadow">
<div class="card-header d-flex justify-content-between align-items-center no-print">
  <h5>Crianças</h5>
  <div class="header-actions">
    <input class="form-control" style="width:220px" placeholder="Buscar por nome" id="buscaCriancas" onkeyup="buscarCriancasPorNome(this.value)">
    <button class="btn btn-success" onclick="novaCrianca()">Novo</button>
    <div class="btn-group">
      <button class="btn btn-info dropdown-toggle" data-bs-toggle="dropdown">Exportar</button>
      <ul class="dropdown-menu">
        <li><a class="dropdown-item" href="#" onclick="exportarParaExcel('criancas')">📊 Excel</a></li>
        <li><a class="dropdown-item" href="#" onclick="exportarParaCSV('criancas')">📄 CSV</a></li>
      </ul>
    </div>
  </div>
</div>
<div class="card-body table-responsive">
<table class="table table-bordered">
<thead class="table-dark"><tr><th>ID</th><th>Nome</th><th>Pai</th><th>Mãe</th><th>CPF</th><th>RG</th><th>Contato</th><th>Data Nasc.</th><th>Congregação</th><th>Endereço</th><th class="no-print">Ações</th></tr></thead>
<tbody id="listaCriancas"></tbody>
</table>
</div>
</div>
</div>

<!-- CONGREGAÇÕES -->
<div class="tab-pane fade" id="tabCongregacoes">
<div class="card shadow">
<div class="card-header d-flex justify-content-between no-print">
  <h5>Congregações</h5>
  <button class="btn btn-success" onclick="novaCongregacao()">Nova</button>
</div>
<div class="card-body">
<table class="table table-bordered">
<thead class="table-dark"><tr><th>ID</th><th>Nome</th><th class="no-print">Ações</th></tr></thead>
<tbody id="listaCongregacoes"></tbody>
</table>
</div>
</div>
</div>

</div>
</div>

<!-- MODAL PESSOA -->
<div class="modal fade" id="modalPessoa">
<div class="modal-dialog modal-lg">
<form class="modal-content" onsubmit="salvarPessoa(event)">
<div class="modal-header"><h5 id="tituloPessoa"></h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
<div class="modal-body row g-3">
<input type="hidden" id="pessoaId"><input type="hidden" id="tipoPessoa">
<div class="col-md-6"><label>Nome *</label><input class="form-control" id="nome" required></div>
<div class="col-md-6"><label>CPF</label><input class="form-control" id="cpf"></div>
<div class="col-md-6"><label>RG</label><input class="form-control" id="rg"></div>
<div class="col-md-6"><label>Contato</label><input class="form-control" id="contato"></div>
<div class="col-md-6"><label>Nome do Pai</label><input class="form-control" id="nome_pai"></div>
<div class="col-md-6"><label>Nome da Mãe</label><input class="form-control" id="nome_mae"></div>
<div class="col-md-6"><label>Data Nascimento</label><input class="form-control" id="data_nasc" type="date"></div>
<div class="col-md-12"><label>Congregação</label><select class="form-select" id="congregacao"><option value="">Selecione...</option></select></div>
<div class="col-12"><h6>Endereço</h6></div>
<div class="col-md-4"><label>Rua</label><input class="form-control" id="rua"></div>
<div class="col-md-4"><label>Número</label><input class="form-control" id="numero"></div>
<div class="col-md-4"><label>Bairro</label><input class="form-control" id="bairro"></div>
</div>
<div class="modal-footer"><button class="btn btn-primary">Salvar</button></div>
</form>
</div>
</div>

<!-- MODAL CONGREGAÇÃO -->
<div class="modal fade" id="modalCongregacao">
<div class="modal-dialog">
<form class="modal-content" onsubmit="salvarCongregacao(event)">
<div class="modal-header"><h5 id="tituloCongregacao"></h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
<div class="modal-body"><input type="hidden" id="congregacaoId"><input class="form-control" id="congregacaoNome" placeholder="Nome da Congregação" required></div>
<div class="modal-footer"><button class="btn btn-primary">Salvar</button></div>
</form>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API = "https://cadastro-acpadesb.onrender.com";

const modalPessoa = new bootstrap.Modal(document.getElementById("modalPessoa"));
const modalCong = new bootstrap.Modal(document.getElementById("modalCongregacao"));

let congregacoes = {};
let cacheAdolescentes = [];
let cacheCriancas = [];

// ================= FUNÇÕES AUXILIARES =================
function formatarData(data) {
  if (!data) return "-";
  if (typeof data === 'string' && data.includes('/')) return data;
  try {
    if (typeof data === 'string' && data.match(/^\d{4}-\d{2}-\d{2}$/)) {
      const [ano, mes, dia] = data.split('-');
      return `${dia}/${mes}/${ano}`;
    }
    const d = new Date(data);
    if (isNaN(d.getTime())) return data;
    return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
  } catch { return data; }
}

function formatarEndereco(endereco) {
  if (!endereco) return "-";
  const partes = [];
  if (endereco.rua) partes.push(endereco.rua);
  if (endereco.numero) partes.push(endereco.numero);
  if (endereco.bairro) partes.push(endereco.bairro);
  return partes.length ? partes.join(", ") : "-";
}

function mostrarNotificacao(titulo, mensagem, tipo) {
  const toast = document.getElementById("notificationToast");
  document.getElementById("toastTitle").textContent = titulo;
  document.getElementById("toastMessage").textContent = mensagem;
  toast.style.display = "block";
  setTimeout(() => { toast.style.display = "none"; }, 5000);
}

function fecharToast() { document.getElementById("notificationToast").style.display = "none"; }

// ================= EXPORTAÇÃO =================
function exportarParaExcel(tipo) {
  const lista = tipo === 'adolescentes' ? cacheAdolescentes : cacheCriancas;
  const dados = lista.map(item => ({
    'ID': item.id, 'Nome': item.nome || '', 'Pai': item.nome_pai || '', 'Mãe': item.nome_mae || '',
    'CPF': item.cpf || '', 'RG': item.rg || '', 'Contato': item.contato || '',
    'Data Nasc': formatarData(item.data_nasc), 'Congregação': congregacoes[item.congregacao] || '',
    'Endereço': formatarEndereco(item.endereco)
  }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(dados), tipo);
  XLSX.writeFile(wb, `ACPADESB_${tipo}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function exportarParaCSV(tipo) {
  const lista = tipo === 'adolescentes' ? cacheAdolescentes : cacheCriancas;
  let csv = 'ID;Nome;Pai;Mãe;CPF;RG;Contato;Data Nasc;Congregação;Endereço\n';
  lista.forEach(item => {
    csv += `${item.id};"${item.nome || ''}";"${item.nome_pai || ''}";"${item.nome_mae || ''}";${item.cpf || ''};${item.rg || ''};${item.contato || ''};${formatarData(item.data_nasc)};"${congregacoes[item.congregacao] || ''}";"${formatarEndereco(item.endereco)}"\n`;
  });
  const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `ACPADESB_${tipo}_${new Date().toISOString().slice(0,10)}.csv`;
  link.click();
}

// ================= MIGRAÇÃO E DELECÃO AUTOMÁTICAS =================
async function executarMigracaoAutomatica() {
  try {
    const r = await fetch(API + "/criancas/migrar-para-adolescentes", { method: "POST" });
    const resultado = await r.json();
    if (resultado.status === "ok" && resultado.migradas?.length > 0) {
      mostrarNotificacao("🎂 Migração", `${resultado.migradas.length} criança(s) migrada(s) para adolescentes`, "success");
    }
  } catch (error) { console.error("Erro migração:", error); }
}

async function deletarMaioresDezoito() {
  try {
    const r = await fetch(API + "/adolescentes/verificar-e-deletar-maiores", { method: "POST" });
    const resultado = await r.json();
    if (resultado.status === "ok" && resultado.deletados > 0) {
      mostrarNotificacao("🗑️ Limpeza", `${resultado.deletados} adolescente(s) removido(s) (mais de 18 anos)`, "warning");
    }
  } catch (error) { console.error("Erro deleção:", error); }
}

// ================= CONGREGAÇÕES =================
async function carregarCongregacoes() {
  try {
    const r = await fetch(API + "/congregacoes/");
    const dados = await r.json();
    congregacoes = {};
    const select = document.getElementById("congregacao");
    select.innerHTML = '<option value="">Selecione...</option>';
    const tbody = document.getElementById("listaCongregacoes");
    tbody.innerHTML = "";
    if (Array.isArray(dados)) {
      dados.forEach(c => {
        congregacoes[c.id] = c.nome;
        select.innerHTML += `<option value="${c.id}">${c.nome}</option>`;
        tbody.innerHTML += `<tr><td>${c.id}</td><td>${c.nome}</td><td class="no-print"><button class="btn btn-sm btn-primary" onclick="editarCongregacao(${c.id}, '${c.nome.replace(/'/g, "\\'")}')">Editar</button> <button class="btn btn-sm btn-danger" onclick="excluirCongregacao(${c.id})">Excluir</button></td></tr>`;
      });
    }
  } catch (error) { console.error("Erro carregar congregações:", error); }
}

function novaCongregacao() {
  document.getElementById("congregacaoId").value = "";
  document.getElementById("congregacaoNome").value = "";
  document.getElementById("tituloCongregacao").innerText = "Nova Congregação";
  modalCong.show();
}

function editarCongregacao(id, nome) {
  document.getElementById("congregacaoId").value = id;
  document.getElementById("congregacaoNome").value = nome;
  document.getElementById("tituloCongregacao").innerText = "Editar Congregação";
  modalCong.show();
}

async function salvarCongregacao(e) {
  e.preventDefault();
  const id = document.getElementById("congregacaoId").value;
  const nome = document.getElementById("congregacaoNome").value;
  try {
    await fetch(API + "/congregacoes/" + (id || ""), {
      method: id ? "PUT" : "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ nome })
    });
    modalCong.hide();
    carregarCongregacoes();
  } catch (error) { alert("Erro ao salvar congregação"); }
}

async function excluirCongregacao(id) {
  if (confirm("Excluir congregação?")) {
    try {
      await fetch(API + "/congregacoes/" + id, { method: "DELETE" });
      carregarCongregacoes();
    } catch (error) { alert("Erro ao excluir congregação"); }
  }
}

// ================= PESSOAS =================
function novoAdolescente() { abrirPessoa("adolescentes"); }
function novaCrianca() { abrirPessoa("criancas"); }

function abrirPessoa(tipo) {
  document.querySelector("#modalPessoa form").reset();
  document.getElementById("pessoaId").value = "";
  document.getElementById("tipoPessoa").value = tipo;
  document.getElementById("tituloPessoa").innerText = "Novo " + (tipo === "criancas" ? "Criança" : "Adolescente");
  modalPessoa.show();
}

function editarPessoa(id, tipo) {
  const lista = tipo === "criancas" ? cacheCriancas : cacheAdolescentes;
  const p = lista.find(x => x.id === id);
  if (!p) return;
  document.getElementById("pessoaId").value = p.id;
  document.getElementById("tipoPessoa").value = tipo;
  document.getElementById("nome").value = p.nome || "";
  document.getElementById("nome_pai").value = p.nome_pai || "";
  document.getElementById("nome_mae").value = p.nome_mae || "";
  document.getElementById("cpf").value = p.cpf || "";
  document.getElementById("rg").value = p.rg || "";
  document.getElementById("contato").value = p.contato || "";
  document.getElementById("data_nasc").value = p.data_nasc || "";
  document.getElementById("congregacao").value = p.congregacao || "";
  document.getElementById("rua").value = p.endereco?.rua || "";
  document.getElementById("numero").value = p.endereco?.numero || "";
  document.getElementById("bairro").value = p.endereco?.bairro || "";
  document.getElementById("tituloPessoa").innerText = "Editar " + (tipo === "criancas" ? "Criança" : "Adolescente");
  modalPessoa.show();
}

async function salvarPessoa(e) {
  e.preventDefault();
  const tipo = document.getElementById("tipoPessoa").value;
  const id = document.getElementById("pessoaId").value;
  const payload = {
    nome: document.getElementById("nome").value,
    nome_pai: document.getElementById("nome_pai").value || null,
    nome_mae: document.getElementById("nome_mae").value || null,
    cpf: document.getElementById("cpf").value || null,
    rg: document.getElementById("rg").value || null,
    contato: document.getElementById("contato").value || null,
    data_nasc: document.getElementById("data_nasc").value || null,
    congregacao: document.getElementById("congregacao").value ? Number(document.getElementById("congregacao").value) : null,
    endereco: {
      rua: document.getElementById("rua").value || null,
      numero: document.getElementById("numero").value || null,
      bairro: document.getElementById("bairro").value || null
    }
  };
  try {
    await fetch(API + "/" + tipo + "/" + (id || ""), {
      method: id ? "PUT" : "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    modalPessoa.hide();
    await executarMigracaoAutomatica();
    await deletarMaioresDezoito();
    listarAdolescentes();
    listarCriancas();
    document.getElementById("buscaAdolescentes").value = "";
    document.getElementById("buscaCriancas").value = "";
    mostrarNotificacao("Sucesso", "Registro salvo!", "success");
  } catch (error) { mostrarNotificacao("Erro", "Erro ao salvar", "error"); }
}

async function excluirPessoa(id, tipo) {
  if (confirm("Excluir registro?")) {
    try {
      await fetch(API + "/" + tipo + "/" + id, { method: "DELETE" });
      await executarMigracaoAutomatica();
      await deletarMaioresDezoito();
      listarAdolescentes();
      listarCriancas();
      mostrarNotificacao("Sucesso", "Registro excluído!", "success");
    } catch (error) { mostrarNotificacao("Erro", "Erro ao excluir", "error"); }
  }
}

// ================= RENDERIZAÇÃO =================
function renderAdolescentes(lista) {
  const tbody = document.getElementById("listaAdolescentes");
  tbody.innerHTML = "";
  if (!lista || lista.length === 0) {
    tbody.innerHTML = '<tr><td colspan="11" class="text-center">Nenhum adolescente cadastrado</td></tr>';
    return;
  }
  lista.forEach(a => {
    tbody.innerHTML += `
      <tr>
        <td>${a.id}</td>
        <td>${a.nome || "-"}</td>
        <td>${a.nome_pai || "-"}</td>
        <td>${a.nome_mae || "-"}</td>
        <td>${a.cpf || "-"}</td>
        <td>${a.rg || "-"}</td>
        <td>${a.contato || "-"}</td>
        <td>${formatarData(a.data_nasc)}</td>
        <td>${congregacoes[a.congregacao] || "-"}</td>
        <td>${formatarEndereco(a.endereco)}</td>
        <td class="no-print">
          <button class="btn btn-sm btn-primary" onclick="editarPessoa(${a.id}, 'adolescentes')">Editar</button>
          <button class="btn btn-sm btn-danger" onclick="excluirPessoa(${a.id}, 'adolescentes')">Excluir</button>
          <button class="btn btn-sm btn-secondary" onclick="imprimirPessoa(${a.id}, 'adolescentes')">Imprimir</button>
        </td>
      </tr>
    `;
  });
}

function renderCriancas(lista) {
  const tbody = document.getElementById("listaCriancas");
  tbody.innerHTML = "";
  if (!lista || lista.length === 0) {
    tbody.innerHTML = '<tr><td colspan="11" class="text-center">Nenhuma criança cadastrada</td></tr>';
    return;
  }
  lista.forEach(c => {
    tbody.innerHTML += `
      <tr>
        <td>${c.id}</td>
        <td>${c.nome || "-"}</td>
        <td>${c.nome_pai || "-"}</td>
        <td>${c.nome_mae || "-"}</td>
        <td>${c.cpf || "-"}</td>
        <td>${c.rg || "-"}</td>
        <td>${c.contato || "-"}</td>
        <td>${formatarData(c.data_nasc)}</td>
        <td>${congregacoes[c.congregacao] || "-"}</td>
        <td>${formatarEndereco(c.endereco)}</td>
        <td class="no-print">
          <button class="btn btn-sm btn-primary" onclick="editarPessoa(${c.id}, 'criancas')">Editar</button>
          <button class="btn btn-sm btn-danger" onclick="excluirPessoa(${c.id}, 'criancas')">Excluir</button>
          <button class="btn btn-sm btn-secondary" onclick="imprimirPessoa(${c.id}, 'criancas')">Imprimir</button>
        </td>
      </tr>
    `;
  });
}

async function listarAdolescentes() {
  try {
    const r = await fetch(API + "/adolescentes/");
    cacheAdolescentes = await r.json();
    renderAdolescentes(cacheAdolescentes);
  } catch (error) { console.error("Erro listar adolescentes:", error); }
}

async function listarCriancas() {
  try {
    const r = await fetch(API + "/criancas/");
    cacheCriancas = await r.json();
    renderCriancas(cacheCriancas);
  } catch (error) { console.error("Erro listar crianças:", error); }
}

// ================= BUSCA =================
async function buscarAdolescentesPorNome(nome) {
  if (!nome || nome.trim() === "") { renderAdolescentes(cacheAdolescentes); return; }
  try {
    const r = await fetch(API + "/adolescentes/buscar?nome=" + encodeURIComponent(nome.trim()));
    renderAdolescentes(await r.json());
  } catch (error) { console.error("Erro busca:", error); }
}

async function buscarCriancasPorNome(nome) {
  if (!nome || nome.trim() === "") { renderCriancas(cacheCriancas); return; }
  try {
    const r = await fetch(API + "/criancas/nome/" + encodeURIComponent(nome.trim()));
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    renderCriancas(await r.json());
  } catch (error) { alert("Erro ao buscar: " + error.message); }
}

// ================= IMPRESSÃO =================
function imprimirPessoa(id, tipo) {
  const lista = tipo === "criancas" ? cacheCriancas : cacheAdolescentes;
  const p = lista.find(x => x.id === id);
  if (!p) { alert("Registro não encontrado"); return; }

  const e = p.endereco || {};
  const enderecoCompleto = [e.rua, e.numero, e.bairro].filter(Boolean).join(", ") || "-";
  const dataNasc = formatarData(p.data_nasc);

  const html = `
    <!DOCTYPE html>
    <html><head><meta charset="UTF-8"><title>Ficha - ${p.nome}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { padding: 40px; font-family: Arial; }
      .logo { max-width: 150px; margin-bottom: 20px; }
      table { width: 100%; border-collapse: collapse; margin-top: 20px; }
      th, td { border: 1px solid #333; padding: 10px; text-align: left; vertical-align: top; }
      th { background: #f0f0f0; width: 30%; }
      h2 { text-align: center; margin-bottom: 30px; }

document.addEventListener("DOMContentLoaded", async () => {

  await listarAdolescentes();
  await listarCriancas();

  document.getElementById("buscaCriancas").addEventListener("keypress", e => { if (e.key === "Enter") buscarCriancasPorNome(e.target.value); });
});
