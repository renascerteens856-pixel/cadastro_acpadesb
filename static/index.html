<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Adolescentes</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: auto; padding: 20px; }
        h1 { text-align: center; }
        form, .result, .list { border: 1px solid #ccc; padding: 15px; border-radius: 10px; margin-top: 20px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input { width: 100%; padding: 8px; margin-top: 4px; }
        button { margin-top: 15px; padding: 10px 15px; cursor: pointer; }
        .adolescente-card { border: 1px solid #ddd; padding: 10px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Sistema de Cadastro de Adolescentes</h1>

    <!-- Cadastro -->
    <form id="formCadastro">
        <h2>Cadastrar Adolescente</h2>

        <label>Nome:</label>
        <input type="text" id="nome" required />

        <label>Nome do Pai:</label>
        <input type="text" id="nome_pai" />

        <label>Nome da Mãe:</label>
        <input type="text" id="nome_mae" />

        <label>Data de Nascimento:</label>
        <input type="date" id="data_nasc" required />

        <h3>Endereço</h3>
        <label>Rua:</label>
        <input type="text" id="rua" required />

        <label>Número:</label>
        <input type="text" id="numero" required />

        <label>Bairro:</label>
        <input type="text" id="bairro" required />

        <label>Contato:</label>
        <input type="text" id="contato" />

        <button type="submit">Cadastrar</button>
    </form>

    <div class="result" id="resultadoCadastro"></div>

    <!-- Buscar por nome -->
    <div class="list">
        <h2>Buscar Adolescente</h2>
        <input type="text" id="buscarNome" placeholder="Digite um nome" />
        <button onclick="buscarPorNome()">Buscar</button>
        <div id="resultadoBusca"></div>
    </div>

    <!-- Listar todos -->
    <div class="list">
        <h2>Listar Todos</h2>
        <button onclick="listarTodos()">Carregar Lista</button>
        <div id="listaTodos"></div>
    </div>

<script>
    const API = "https://cadastro-adolescentes.onrender.com/adolescentes";

    document.getElementById("formCadastro").addEventListener("submit", async (e) => {
        e.preventDefault();

        const data = {
            nome: document.getElementById("nome").value,
            nome_pai: document.getElementById("nome_pai").value,
            nome_mae: document.getElementById("nome_mae").value,
            data_nasc: document.getElementById("data_nasc").value,
            contato: document.getElementById("contato").value,
            endereco: {
                rua: document.getElementById("rua").value,
                numero: document.getElementById("numero").value,
                bairro: document.getElementById("bairro").value
            }
        };

        const resp = await fetch(API + "/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        const json = await resp.json();
        document.getElementById("resultadoCadastro").innerHTML = "<pre>" + JSON.stringify(json, null, 2) + "</pre>";
    });

    async function buscarPorNome() {
        const nome = document.getElementById("buscarNome").value;
        const resp = await fetch(API + `/buscar?nome=${nome}`);
        const json = await resp.json();

        let html = "";
        if (Array.isArray(json)) {
            json.forEach(a => {
                html += `<div class='adolescente-card'>
                    <strong>${a.nome}</strong><br>
                    Pai: ${a.nome_pai || "-"}<br>
                    Mãe: ${a.nome_mae || "-"}<br>
                    Bairro: ${a.endereco?.bairro || "-"}
                </div>`;
            });
        } else {
            html = `<pre>${JSON.stringify(json, null, 2)}</pre>`;
        }

        document.getElementById("resultadoBusca").innerHTML = html;
    }

    async function listarTodos() {
        const resp = await fetch(API + "/");
        const json = await resp.json();

        let html = "";
        json.dados?.forEach(a => {
            html += `<div class='adolescente-card'>
                <strong>${a.nome}</strong> (ID: ${a.id})<br>
                Bairro: ${a.endereco?.bairro || "-"}
            </div>`;
        });

        document.getElementById("listaTodos").innerHTML = html;
    }
</script>

</body>
</html>
