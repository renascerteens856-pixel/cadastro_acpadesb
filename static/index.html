<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastro de Adolescentes</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f7f7f7;
        }
        .table-container {
            margin-top: 40px;
        }
    </style>
</head>
<body>
<div class="container table-container">
    <h1 class="text-center mb-4">Lista de Adolescentes</h1>

    <div class="d-flex justify-content-between mb-3">
        <input id="campoBusca" class="form-control w-50" placeholder="Buscar por nome...">
        <button class="btn btn-primary" onclick="carregarTodos()">Recarregar</button>
    </div>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Pai</th>
                <th>Mãe</th>
                <th>Contato</th>
                <th>Nascimento</th>
                <th>Endereço</th>
            </tr>
        </thead>
        <tbody id="tabela-adolescentes">
            <tr><td colspan="7" class="text-center">Carregando...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const API = "https://cadastro-adolescentes.onrender.com/adolescentes";

    async function carregarTodos() {
        const tbody = document.getElementById("tabela-adolescentes");
        tbody.innerHTML = `<tr><td colspan="7" class="text-center">Carregando...</td></tr>`;

        try {
            const resp = await fetch(`${API}/todos`);
            const dados = await resp.json();
            preencherTabela(dados);
        } catch (e) {
            tbody.innerHTML = `<tr><td colspan="7" class="text-danger text-center">Erro ao carregar dados</td></tr>`;
        }
    }

    async function buscarPorNome() {
        const nome = document.getElementById("campoBusca").value.trim();
        const tbody = document.getElementById("tabela-adolescentes");

        if (!nome) {
            carregarTodos();
            return;
        }

        tbody.innerHTML = `<tr><td colspan="7" class="text-center">Buscando...</td></tr>`;

        try {
            const resp = await fetch(`${API}/buscar?nome=${encodeURIComponent(nome)}`);
            const dados = await resp.json();
            preencherTabela(dados);
        } catch (e) {
            tbody.innerHTML = `<tr><td colspan="7" class="text-danger text-center">Erro na busca</td></tr>`;
        }
    }

    function preencherTabela(lista) {
        const tbody = document.getElementById("tabela-adolescentes");
        tbody.innerHTML = "";

        if (!lista || lista.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" class="text-center">Nenhum registro encontrado</td></tr>`;
            return;
        }

        lista.forEach(item => {
            const end = item.endereco ? `${item.endereco.bairro || ''}, ${item.endereco.cidade || ''}` : '';
            const linha = `
                <tr>
                    <td>${item.id}</td>
                    <td>${item.nome}</td>
                    <td>${item.nome_pai || ''}</td>
                    <td>${item.nome_mae || ''}</td>
                    <td>${item.contato || ''}</td>
                    <td>${item.data_nasc || ''}</td>
                    <td>${end}</td>
                </tr>`;
            tbody.innerHTML += linha;
        });
    }

    document.getElementById("campoBusca").addEventListener("keyup", buscarPorNome);

    // Carrega automaticamente ao abrir a página
    carregarTodos();
</script>

</body>
</html>
