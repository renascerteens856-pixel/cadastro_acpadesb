<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <title>ACPADESB</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <style>
        body { background: #f4f4f4; }
        .card { margin-top: 20px; }
        #logoTopo {
            display: block;
            margin: 20px auto;
            max-width: 220px;
        }
    </style>
</head>

<body>

<img id="logoTopo" src="static/Images/ACP_Escuro.png" alt="Logo"/>

<div class="container">

    <!-- ABAS -->
    <ul class="nav nav-tabs" id="tabs" role="tablist">
        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#aba-adolescentes">
                Adolescentes
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#aba-congregacoes">
                Congregações
            </button>
        </li>
    </ul>

    <div class="tab-content">

        <!-- ================= ABA ADOLESCENTES ================= -->
        <div class="tab-pane fade show active" id="aba-adolescentes">
            <div class="card shadow">
                <div class="card-header bg-primary text-white d-flex justify-content-between">
                    <h4 class="mb-0">Lista de Adolescentes</h4>
                    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalAdolescente">
                        Novo Adolescente
                    </button>
                </div>

                <div class="card-body">
                    <table class="table table-bordered table-striped text-center align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Nome</th>
                                <th>Pai</th>
                                <th>Mãe</th>
                                <th>Contato</th>
                                <th>Data Nasc.</th>
                                <th>Endereço</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="lista-adolescentes"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ================= ABA CONGREGAÇÕES ================= -->
        <div class="tab-pane fade" id="aba-congregacoes">
            <div class="card shadow">
                <div class="card-header bg-secondary text-white d-flex justify-content-between">
                    <h4 class="mb-0">Congregações</h4>
                    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalCongregacao">
                        Nova Congregação
                    </button>
                </div>

                <div class="card-body">
                    <table class="table table-bordered table-striped text-center">
                        <thead class="table-dark">
                            <tr>
                                <th>Nome</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="lista-congregacoes"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- ================= MODAL CONGREGAÇÃO ================= -->
<div class="modal fade" id="modalCongregacao">
    <div class="modal-dialog">
        <form id="formCongregacao" class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Congregação</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <input type="hidden" id="congregacaoId">
                <div class="mb-3">
                    <label class="form-label">Nome *</label>
                    <input type="text" id="congregacaoNome" class="form-control" required>
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-primary">Salvar</button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API_ADO = "http://127.0.0.1:5000/adolescentes/";
const API_CONG = "http://127.0.0.1:5000/congregacoes/";

/* ================= CONGREGAÇÕES ================= */

async function listarCongregacoes() {
    const res = await fetch(API_CONG);
    const dados = await res.json();

    const tbody = document.getElementById("lista-congregacoes");
    tbody.innerHTML = "";

    dados.forEach(c => {
        tbody.innerHTML += `
            <tr>
                <td>${c.nome}</td>
                <td>
                    <button class="btn btn-sm btn-primary" onclick="editarCongregacao('${c.nome}')">Editar</button>
                    <button class="btn btn-sm btn-danger" onclick="excluirCongregacao('${c.nome}')">Excluir</button>
                </td>
            </tr>
        `;
    });
}

document.getElementById("formCongregacao").onsubmit = async e => {
    e.preventDefault();

    const id = document.getElementById("congregacaoId").value;
    const nome = document.getElementById("congregacaoNome").value;

    await fetch(API_CONG + (id || ""), {
        method: id ? "PUT" : "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nome })
    });

    bootstrap.Modal.getInstance(document.getElementById("modalCongregacao")).hide();
    listarCongregacoes();
};

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", () => {
    listarCongregacoes();
});
</script>

</body>
</html>
