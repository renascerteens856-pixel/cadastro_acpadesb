<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ACPADESB</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f4f4f4; }
#logoTopo { display:block; margin:20px auto; max-width:220px; }
.card { margin-top:20px; }
th, td { text-align:center; vertical-align:middle; font-size:14px; }
</style>
</head>

<body>

<img id="logoTopo" src="/static/Images/ACP_Escuro.png">

<div class="container">

<ul class="nav nav-tabs">
  <li class="nav-item">
    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabAdolescentes">Adolescentes</button>
  </li>
  <li class="nav-item">
    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabCriancas">Crianças</button>
  </li>
  <li class="nav-item">
    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabCongregacoes">Congregações</button>
  </li>
</ul>

<div class="tab-content">

<!-- ================= ADOLESCENTES ================= -->
<div class="tab-pane fade show active" id="tabAdolescentes">
<div class="card shadow">
<div class="card-header d-flex justify-content-between align-items-center">
  <h5>Adolescentes</h5>
  <div>
    <input class="form-control d-inline-block me-2" style="width:220px"
      placeholder="Buscar por nome"
      id="buscaAdolescentes"
      onkeyup="buscarAdolescentesPorNome(this.value)">
    <button class="btn btn-success" onclick="novoAdolescente()">Novo</button>
  </div>
</div>

<div class="card-body table-responsive">
<table class="table table-bordered table-striped">
<thead class="table-dark">
<tr>
  <th>ID</th>
  <th>Nome</th>
  <th>Pai</th>
  <th>Mãe</th>
  <th>CPF</th>
  <th>Contato</th>
  <th>Data Nasc.</th>
  <th>Congregação</th>
  <th>Endereço</th>
  <th>Ações</th>
</tr>
</thead>
<tbody id="listaAdolescentes"></tbody>
</table>
</div>
</div>
</div>

<!-- ================= CRIANÇAS ================= -->
<div class="tab-pane fade" id="tabCriancas">
<div class="card shadow">
<div class="card-header d-flex justify-content-between align-items-center">
  <h5>Crianças</h5>
  <div>
    <input class="form-control d-inline-block me-2" style="width:220px"
      placeholder="Buscar por nome"
      id="buscaCriancas"
      onkeyup="buscarCriancasPorNome(this.value)">
    <button class="btn btn-success" onclick="novaCrianca()">Novo</button>
  </div>
</div>

<div class="card-body table-responsive">
<table class="table table-bordered table-striped">
<thead class="table-dark">
<tr>
  <th>ID</th>
  <th>Nome</th>
  <th>Pai</th>
  <th>Mãe</th>
  <th>CPF</th>
  <th>Contato</th>
  <th>Data Nasc.</th>
  <th>Congregação</th>
  <th>Endereço</th>
  <th>Ações</th>
</tr>
</thead>
<tbody id="listaCriancas"></tbody>
</table>
</div>
</div>
</div>

<!-- ================= CONGREGAÇÕES ================= -->
<div class="tab-pane fade" id="tabCongregacoes">
<div class="card shadow">
<div class="card-header d-flex justify-content-between">
  <h5>Congregações</h5>
  <button class="btn btn-success" onclick="novaCongregacao()">Nova</button>
</div>

<div class="card-body">
<table class="table table-bordered table-striped">
<thead class="table-dark">
<tr>
  <th>ID</th>
  <th>Nome</th>
  <th>Ações</th>
</tr>
</thead>
<tbody id="listaCongregacoes"></tbody>
</table>
</div>
</div>
</div>

</div>
</div>

<!-- ================= MODAL PESSOA ================= -->
<div class="modal fade" id="modalPessoa">
<div class="modal-dialog modal-lg">
<form class="modal-content" onsubmit="salvarPessoa(event)">
<div class="modal-header">
  <h5 id="tituloPessoa"></h5>
  <button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body row g-3">
<input type="hidden" id="pessoaId">
<input type="hidden" id="tipoPessoa">

<div class="col-md-6">
  <label class="form-label">Nome *</label>
  <input class="form-control" id="nome" required>
</div>

<div class="col-md-6">
  <label class="form-label">CPF</label>
  <input class="form-control" id="cpf" placeholder="000.000.000-00">
</div>

<div class="col-md-6">
  <label class="form-label">Nome do Pai</label>
  <input class="form-control" id="nome_pai">
</div>

<div class="col-md-6">
  <label class="form-label">Nome da Mãe</label>
  <input class="form-control" id="nome_mae">
</div>

<div class="col-md-6">
  <label class="form-label">Contato</label>
  <input class="form-control" id="contato" placeholder="(00) 00000-0000">
</div>

<div class="col-md-6">
  <label class="form-label">Data de Nascimento</label>
  <input class="form-control" id="data_nasc" type="date">
</div>

<div class="col-md-12">
  <label class="form-label">Congregação</label>
  <select class="form-select" id="congregacao">
    <option value="">Selecione...</option>
  </select>
</div>

<div class="col-12">
  <h6 class="mt-2">Endereço</h6>
</div>

<div class="col-md-4">
  <label class="form-label">Rua</label>
  <input class="form-control" id="rua">
</div>

<div class="col-md-4">
  <label class="form-label">Número</label>
  <input class="form-control" id="numero">
</div>

<div class="col-md-4">
  <label class="form-label">Bairro</label>
  <input class="form-control" id="bairro">
</div>
</div>

<div class="modal-footer">
<button class="btn btn-primary">Salvar</button>
</div>
</form>
</div>
</div>

<!-- ================= MODAL CONGREGAÇÃO ================= -->
<div class="modal fade" id="modalCongregacao">
<div class="modal-dialog">
<form class="modal-content" onsubmit="salvarCongregacao(event)">
<div class="modal-header">
  <h5 id="tituloCongregacao"></h5>
  <button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
<input type="hidden" id="congregacaoId">
<div class="mb-3">
  <label class="form-label">Nome da Congregação *</label>
  <input class="form-control" id="congregacaoNome" required>
</div>
</div>

<div class="modal-footer">
<button class="btn btn-primary">Salvar</button>
</div>
</form>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API = "https://cadastro-adolescentes.onrender.com";

const modalPessoa = new bootstrap.Modal(document.getElementById("modalPessoa"));
const modalCong = new bootstrap.Modal(document.getElementById("modalCongregacao"));

let congregacoes = {};
let cacheAdolescentes = [];
let cacheCriancas = [];

// ================= CONGREGAÇÕES =================
async function carregarCongregacoes() {
  try {
    const r = await fetch(API + "/congregacoes/");
    const dados = await r.json();
    congregacoes = {};
    const selectCong = document.getElementById("congregacao");
    selectCong.innerHTML = '<option value="">Selecione...</option>';

    const tbody = document.getElementById("listaCongregacoes");
    tbody.innerHTML = "";

    dados.forEach(c => {
      congregacoes[c.id] = c.nome;
      selectCong.innerHTML += `<option value="${c.id}">${c.nome}</option>`;
      tbody.innerHTML += `
        <tr>
          <td>${c.id}</td>
          <td>${c.nome}</td>
          <td>
            <button class="btn btn-sm btn-primary" onclick="editarCongregacao(${c.id}, '${c.nome}')">Editar</button>
            <button class="btn btn-sm btn-danger" onclick="excluirCongregacao(${c.id})">Excluir</button>
          </td>
        </tr>`;
    });
  } catch (error) {
    console.error("Erro ao carregar congregações:", error);
  }
}

function novaCongregacao() {
  document.getElementById("congregacaoId").value = "";
  document.getElementById("congregacaoNome").value = "";
  document.getElementById("tituloCongregacao").innerText = "Nova Congregação";
  modalCong.show();
}

function editarCongregacao(id, nome) {
  document.getElementById("congregacaoId").value = id;
  document.getElementById("congregacaoNome").value = nome;
  document.getElementById("tituloCongregacao").innerText = "Editar Congregação";
  modalCong.show();
}

async function salvarCongregacao(e) {
  e.preventDefault();
  const id = document.getElementById("congregacaoId").value;
  const nome = document.getElementById("congregacaoNome").value;

  try {
    await fetch(API + "/congregacoes/" + (id || ""), {
      method: id ? "PUT" : "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ nome })
    });
    modalCong.hide();
    carregarCongregacoes();
  } catch (error) {
    console.error("Erro ao salvar congregação:", error);
    alert("Erro ao salvar congregação");
  }
}

async function excluirCongregacao(id) {
  if (confirm("Excluir congregação?")) {
    try {
      await fetch(API + "/congregacoes/" + id, { method: "DELETE" });
      carregarCongregacoes();
    } catch (error) {
      console.error("Erro ao excluir congregação:", error);
      alert("Erro ao excluir congregação");
    }
  }
}

// ================= PESSOAS =================
function novoAdolescente() { abrirPessoa("adolescentes"); }
function novaCrianca() { abrirPessoa("criancas"); }

function abrirPessoa(tipo) {
  document.querySelector("#modalPessoa form").reset();
  document.getElementById("pessoaId").value = "";
  document.getElementById("tipoPessoa").value = tipo;
  document.getElementById("tituloPessoa").innerText = "Novo " + (tipo === "criancas" ? "Criança" : "Adolescente");
  modalPessoa.show();
}

function editarPessoa(id, tipo) {
  const lista = tipo === "criancas" ? cacheCriancas : cacheAdolescentes;
  const p = lista.find(x => x.id === id);
  if (!p) return;

  document.getElementById("pessoaId").value = p.id;
  document.getElementById("tipoPessoa").value = tipo;
  document.getElementById("nome").value = p.nome || "";
  document.getElementById("nome_pai").value = p.nome_pai || "";
  document.getElementById("nome_mae").value = p.nome_mae || "";
  document.getElementById("cpf").value = p.cpf || "";
  document.getElementById("contato").value = p.contato || "";
  document.getElementById("data_nasc").value = p.data_nasc || "";
  document.getElementById("congregacao").value = p.congregacao || "";
  document.getElementById("rua").value = p.endereco?.rua || "";
  document.getElementById("numero").value = p.endereco?.numero || "";
  document.getElementById("bairro").value = p.endereco?.bairro || "";

  document.getElementById("tituloPessoa").innerText = "Editar " + (tipo === "criancas" ? "Criança" : "Adolescente");
  modalPessoa.show();
}

async function salvarPessoa(e) {
  e.preventDefault();
  const tipo = document.getElementById("tipoPessoa").value;
  const id = document.getElementById("pessoaId").value;

  // Construir payload com TODOS os campos do backend
  const payload = {
    nome: document.getElementById("nome").value,
    nome_pai: document.getElementById("nome_pai").value || null,
    nome_mae: document.getElementById("nome_mae").value || null,
    cpf: document.getElementById("cpf").value || null,
    contato: document.getElementById("contato").value || null,
    data_nasc: document.getElementById("data_nasc").value || null,
    congregacao: document.getElementById("congregacao").value ? Number(document.getElementById("congregacao").value) : null,
    endereco: {
      rua: document.getElementById("rua").value || null,
      numero: document.getElementById("numero").value || null,
      bairro: document.getElementById("bairro").value || null
    }
  };

  try {
    await fetch(API + "/" + tipo + "/" + (id || ""), {
      method: id ? "PUT" : "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    modalPessoa.hide();
    listarAdolescentes();
    listarCriancas();

    // Limpar campos de busca
    document.getElementById("buscaAdolescentes").value = "";
    document.getElementById("buscaCriancas").value = "";
  } catch (error) {
    console.error("Erro ao salvar pessoa:", error);
    alert("Erro ao salvar: " + error.message);
  }
}

async function excluirPessoa(id, tipo) {
  if (confirm("Excluir registro?")) {
    try {
      await fetch(API + "/" + tipo + "/" + id, { method: "DELETE" });
      listarAdolescentes();
      listarCriancas();
    } catch (error) {
      console.error("Erro ao excluir:", error);
      alert("Erro ao excluir");
    }
  }
}

// ================= LISTAS =================
function formatarEndereco(endereco) {
  if (!endereco) return "-";
  const partes = [];
  if (endereco.rua) partes.push(endereco.rua);
  if (endereco.numero) partes.push(endereco.numero);
  if (endereco.bairro) partes.push(endereco.bairro);
  return partes.length ? partes.join(", ") : "-";
}

// Substitua a função formatarData por esta versão corrigida
function formatarData(data) {
  if (!data) return "-";

  // Se a data já estiver no formato DD/MM/YYYY, retorna ela mesma
  if (typeof data === 'string' && data.includes('/')) {
    return data;
  }

  try {
    // Para datas no formato YYYY-MM-DD (ISO), extrair partes diretamente
    if (typeof data === 'string' && data.match(/^\d{4}-\d{2}-\d{2}$/)) {
      const [ano, mes, dia] = data.split('-');
      return `${dia}/${mes}/${ano}`;
    }

    // Para outros formatos, tentar converter com cuidado
    const d = new Date(data);
    if (isNaN(d.getTime())) return data;

    // Criar data considerando o fuso UTC para evitar problemas de fuso
    const ano = d.getUTCFullYear();
    const mes = String(d.getUTCMonth() + 1).padStart(2, '0');
    const dia = String(d.getUTCDate()).padStart(2, '0');

    return `${dia}/${mes}/${ano}`;
  } catch {
    return data;
  }
}

function renderAdolescentes(lista) {
  const tbody = document.getElementById("listaAdolescentes");
  tbody.innerHTML = "";
  lista.forEach(a => {
    tbody.innerHTML += `
      <tr>
        <td>${a.id}</td>
        <td>${a.nome || "-"}</td>
        <td>${a.nome_pai || "-"}</td>
        <td>${a.nome_mae || "-"}</td>
        <td>${a.cpf || "-"}</td>
        <td>${a.contato || "-"}</td>
        <td>${formatarData(a.data_nasc)}</td>
        <td>${congregacoes[a.congregacao] || "-"}</td>
        <td>${formatarEndereco(a.endereco)}</td>
        <td>
          <button class="btn btn-sm btn-primary" onclick="editarPessoa(${a.id}, 'adolescentes')">Editar</button>
          <button class="btn btn-sm btn-danger" onclick="excluirPessoa(${a.id}, 'adolescentes')">Excluir</button>
          <button class="btn btn-sm btn-secondary" onclick="imprimirPessoa(${a.id}, 'adolescentes')">Imprimir</button>
        </td>
      </tr>`;
  });
}

function renderCriancas(lista) {
  const tbody = document.getElementById("listaCriancas");
  tbody.innerHTML = "";
  lista.forEach(c => {
    tbody.innerHTML += `
      <tr>
        <td>${c.id}</td>
        <td>${c.nome || "-"}</td>
        <td>${c.nome_pai || "-"}</td>
        <td>${c.nome_mae || "-"}</td>
        <td>${c.cpf || "-"}</td>
        <td>${c.contato || "-"}</td>
        <td>${formatarData(c.data_nasc)}</td>
        <td>${congregacoes[c.congregacao] || "-"}</td>
        <td>${formatarEndereco(c.endereco)}</td>
        <td>
          <button class="btn btn-sm btn-primary" onclick="editarPessoa(${c.id}, 'criancas')">Editar</button>
          <button class="btn btn-sm btn-danger" onclick="excluirPessoa(${c.id}, 'criancas')">Excluir</button>
          <button class="btn btn-sm btn-secondary" onclick="imprimirPessoa(${c.id}, 'criancas')">Imprimir</button>
        </td>
      </tr>`;
  });
}

async function listarAdolescentes() {
  try {
    const r = await fetch(API + "/adolescentes/");
    cacheAdolescentes = await r.json();
    renderAdolescentes(cacheAdolescentes);
  } catch (error) {
    console.error("Erro ao listar adolescentes:", error);
  }
}

async function listarCriancas() {
  try {
    const r = await fetch(API + "/criancas/");
    cacheCriancas = await r.json();
    renderCriancas(cacheCriancas);
  } catch (error) {
    console.error("Erro ao listar crianças:", error);
  }
}

// ================= BUSCA =================
async function buscarAdolescentesPorNome(nome) {
  if (!nome || nome.trim() === "") {
    renderAdolescentes(cacheAdolescentes);
    return;
  }
  try {
    const r = await fetch(API + "/adolescentes/buscar?nome=" + encodeURIComponent(nome.trim()));
    const dados = await r.json();
    renderAdolescentes(dados);
  } catch (error) {
    console.error("Erro na busca de adolescentes:", error);
  }
}

async function buscarCriancasPorNome(nome) {
  if (!nome || nome.trim() === "") {
    renderCriancas(cacheCriancas);
    return;
  }
  try {
    const url = API + "/criancas/nome/" + encodeURIComponent(nome.trim());
    const r = await fetch(url);
    if (!r.ok) throw new Error(`Erro HTTP ${r.status}`);
    const dados = await r.json();
    renderCriancas(dados);
  } catch (error) {
    console.error("Erro na busca de crianças:", error);
    alert("Erro ao buscar crianças: " + error.message);
  }
}

// Corrigir também a função imprimirPessoa para usar a mesma formatação
function imprimirPessoa(id, tipo) {
  const lista = tipo === "criancas" ? cacheCriancas : cacheAdolescentes;
  const p = lista.find(x => x.id === id);
  if (!p) return;

  const e = p.endereco || {};
  const cong = congregacoes[p.congregacao] || "-";
  const dataNasc = formatarData(p.data_nasc); // Usando a função corrigida

  const w = window.open("", "_blank");
  w.document.write(`
    <html>
    <head>
      <title>Impressão</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
      <style>
        body { font-family: Arial; padding: 40px; }
        img { display: block; margin: 0 auto 20px; max-width: 200px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 8px; text-align: left; }
        th { background-color: #f0f0f0; }
        h2 { text-align: center; margin-bottom: 30px; }
      </style>
    </head>
    <body>
      <img src="/static/Images/ACP_Escuro.png">
      <h2>${tipo === "criancas" ? "Cadastro de Criança" : "Cadastro de Adolescente"}</h2>
      <table class="table table-bordered">
        <tr><th style="width:30%">ID</th><td>${p.id}</td></tr>
        <tr><th>Nome</th><td>${p.nome || "-"}</td></tr>
        <tr><th>Nome do Pai</th><td>${p.nome_pai || "-"}</td></tr>
        <tr><th>Nome da Mãe</th><td>${p.nome_mae || "-"}</td></tr>
        <tr><th>CPF</th><td>${p.cpf || "-"}</td></tr>
        <tr><th>Contato</th><td>${p.contato || "-"}</td></tr>
        <tr><th>Data de Nascimento</th><td>${dataNasc}</td></tr>
        <tr><th>Congregação</th><td>${cong}</td></tr>
        <tr><th>Endereço</th><td>${formatarEndereco(e)}</td></tr>
      </table>
      <script>
        window.onload = function() {
          window.print();
          setTimeout(() => window.close(), 500);
        }
      <\/script>
    </body>
    </html>
  `);
  w.document.close();
}

// ================= INIT =================
document.addEventListener("DOMContentLoaded", async () => {
  await carregarCongregacoes();
  listarAdolescentes();
  listarCriancas();

  document.getElementById("buscaAdolescentes").addEventListener("keypress", (e) => {
    if (e.key === "Enter") buscarAdolescentesPorNome(e.target.value);
  });

  document.getElementById("buscaCriancas").addEventListener("keypress", (e) => {
    if (e.key === "Enter") buscarCriancasPorNome(e.target.value);
  });
});
</script>

</body>
</html>
