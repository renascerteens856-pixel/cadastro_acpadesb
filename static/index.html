<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cadastro de Adolescentes</title>

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body { background: #f5f5f5; }
    .container-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .logo-img { width: 160px; display:block; margin:10px auto 20px; }
    #mensagem { display:none; }
  </style>
</head>

<body>

<div class="container mt-4">

  <!-- LOGO -->
  <img src="Images/logo_adolescentes.PNG" alt="Logo" class="logo-img">

  <h2 class="text-center mb-3">Cadastro de Adolescentes</h2>

  <!-- MENSAGEM -->
  <div id="mensagem" class="alert"></div>

  <!-- FORMULÁRIO -->
  <div class="container-box">
    <div class="row g-3">

      <div class="col-md-8">
        <label>Nome completo</label>
        <input id="nome" class="form-control" />
      </div>

      <div class="col-md-4">
        <label>Contato</label>
        <input id="contato" class="form-control" placeholder="(99) 99999-9999" />
      </div>

      <div class="col-md-6">
        <label>Nome do Pai</label>
        <input id="nome_pai" class="form-control" />
      </div>

      <div class="col-md-6">
        <label>Nome da Mãe</label>
        <input id="nome_mae" class="form-control" />
      </div>

      <div class="col-md-4">
        <label>Data de Nascimento</label>
        <input id="data_nasc" type="date" class="form-control" />
      </div>

      <h5 class="mt-3">Endereço</h5>

      <div class="col-md-6">
        <label>Rua</label>
        <input id="rua" class="form-control" />
      </div>

      <div class="col-md-3">
        <label>Número</label>
        <input id="numero" class="form-control" />
      </div>

      <div class="col-md-3">
        <label>Bairro</label>
        <input id="bairro" class="form-control" />
      </div>

      <div class="col-12 mt-3">
        <button onclick="salvarAdolescente()" class="btn btn-primary w-100">Salvar</button>
      </div>

    </div>
  </div>

</div>

<script>
// ===============================
// BUSCAR POR NOME
// ===============================
async function buscarPorNome() {
    const nome = document.getElementById("buscarNome").value;

    const url = nome.trim()
        ? `https://cadastro-adolescentes.onrender.com/adolescentes?nome=${encodeURIComponent(nome)}`
        : `https://cadastro-adolescentes.onrender.com/adolescentes`;

    const resposta = await fetch(url);
    const dados = await resposta.json();

    mostrarLista(dados);
}

// ===============================
// MOSTRAR LISTA DE ADOLESCENTES
// ===============================
function mostrarLista(lista) {
    const tbody = document.getElementById("listaAdolescentes");
    tbody.innerHTML = "";

    lista.forEach(a => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${a.id}</td>
            <td>${a.nome}</td>
            <td>${a.idade}</td>
            <td>${a.contato}</td>
            <td>${a.endereco?.rua || ""}, ${a.endereco?.numero || ""}, ${a.endereco?.bairro || ""}</td>
            <td>
                <button onclick="carregarParaEdicao(${a.id})">Editar</button>
            </td>
        `;

        tbody.appendChild(tr);
    });
}

// ===============================
// BUSCAR POR ID E PREPARAR FORMULÁRIO DE EDIÇÃO
// ===============================
async function carregarParaEdicao(id) {
    const resposta = await fetch(`https://cadastro-adolescentes.onrender.com/adolescentes/${id}`);
    const dados = await resposta.json();

    document.getElementById("idEdicao").value = dados.id;
    document.getElementById("nomeEdicao").value = dados.nome;
    document.getElementById("idadeEdicao").value = dados.idade;
    document.getElementById("contatoEdicao").value = dados.contato;

    document.getElementById("ruaEdicao").value = dados.endereco?.rua || "";
    document.getElementById("numeroEdicao").value = dados.endereco?.numero || "";
    document.getElementById("bairroEdicao").value = dados.endereco?.bairro || "";

    document.getElementById("formEdicao").style.display = "block";
}

// ===============================
// SALVAR ALTERAÇÕES (PUT)
// ===============================
async function salvarAlteracoes() {
    const id = document.getElementById("idEdicao").value;

    const corpo = {
        nome: document.getElementById("nomeEdicao").value,
        idade: parseInt(document.getElementById("idadeEdicao").value),
        contato: document.getElementById("contatoEdicao").value,
        endereco: {
            rua: document.getElementById("ruaEdicao").value,
            numero: document.getElementById("numeroEdicao").value,
            bairro: document.getElementById("bairroEdicao").value
        }
    };

    const resposta = await fetch(`https://cadastro-adolescentes.onrender.com/adolescentes/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(corpo)
    });

    const dados = await resposta.json();
    console.log("Resposta do PUT:", dados);

    if (resposta.ok) {
        alert("Atualizado com sucesso!");
        buscarPorNome();
        document.getElementById("formEdicao").style.display = "none";
    } else {
        alert("Erro ao atualizar: " + JSON.stringify(dados));
    }
}
</script>

</body>
</html>
